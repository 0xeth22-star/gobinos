<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gobinos</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --green:#2a5c2a; --bright:#4ade80; --mud:#111208; --slime:#6b8f3e; --bone:#e8dcc8; --blood:#cc2200; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--mud);background-image:radial-gradient(ellipse at 30% 60%,rgba(42,92,42,0.12) 0%,transparent 60%);min-height:100vh;font-family:'Space Mono',monospace;color:var(--bone);display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{width:100%;max-width:480px;background:rgba(0,0,0,0.5);border:1px solid rgba(107,143,62,0.25);border-radius:6px;padding:40px 36px;position:relative;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--bright),transparent);}
  .title{font-family:'Creepster',cursive;font-size:2.8rem;color:var(--bright);letter-spacing:4px;text-shadow:0 0 24px rgba(74,222,128,0.3);line-height:1;margin-bottom:6px;text-align:center;}
  .closed-title{font-family:'Creepster',cursive;font-size:1.8rem;letter-spacing:3px;color:var(--blood);text-align:center;margin-top:20px;margin-bottom:8px;}
  .closed-sub{font-size:.62rem;color:rgba(232,220,200,.35);letter-spacing:2px;line-height:2;text-align:center;margin-bottom:4px;}
  .game-btn{display:block;width:100%;margin-top:28px;padding:16px;background:var(--green);border:1px solid rgba(74,222,128,0.4);border-radius:4px;color:var(--bone);font-family:'Creepster',cursive;font-size:1.2rem;letter-spacing:3px;cursor:pointer;text-transform:uppercase;text-align:center;text-decoration:none;transition:all .2s;position:relative;}
  .game-btn:hover{background:rgba(42,92,42,.9);box-shadow:0 0 20px rgba(74,222,128,.2);}
  .game-sub{font-size:.46rem;color:rgba(74,222,128,.35);letter-spacing:3px;text-align:center;margin-top:8px;text-transform:uppercase;}
  .divider{border-top:1px solid rgba(107,143,62,.1);margin:24px 0;}
  .checker-label{font-size:.48rem;letter-spacing:3px;color:var(--slime);text-transform:uppercase;margin-bottom:10px;text-align:center;}
  .checker-row{display:flex;gap:8px;}
  .checker-input{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(107,143,62,.2);border-radius:4px;padding:11px 12px;color:var(--bone);font-family:'Space Mono',monospace;font-size:.72rem;outline:none;transition:border-color .2s;}
  .checker-input::placeholder{color:rgba(232,220,200,.15);}
  .checker-input:focus{border-color:rgba(74,222,128,.4);}
  .checker-input.err{border-color:rgba(204,34,0,.5);}
  .checker-btn{padding:11px 16px;background:rgba(42,92,42,.5);border:1px solid rgba(74,222,128,.3);border-radius:4px;color:var(--bone);font-family:'Creepster',cursive;font-size:.95rem;letter-spacing:2px;cursor:pointer;white-space:nowrap;transition:background .2s;}
  .checker-btn:hover{background:rgba(42,92,42,.8);}
  .checker-btn:disabled{opacity:.4;cursor:not-allowed;}
  .checker-result{margin-top:10px;font-size:.62rem;letter-spacing:2px;text-align:center;padding:10px;border-radius:4px;display:none;}
  /* admin */
  .admin-toggle{position:fixed;bottom:16px;right:16px;background:transparent;border:none;width:20px;height:20px;cursor:default;opacity:0;}
  .admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:center;justify-content:center;padding:24px;}
  .admin-overlay.show{display:flex;}
  .admin-card{background:#0d0d0d;border:1px solid rgba(107,143,62,.3);border-radius:6px;padding:32px;width:100%;max-width:400px;position:relative;max-height:88vh;overflow-y:auto;}
  .admin-title{font-family:'Creepster',cursive;font-size:1.4rem;color:var(--slime);letter-spacing:3px;margin-bottom:24px;}
  .admin-field{margin-bottom:14px;}
  .admin-field label{display:block;font-size:.48rem;letter-spacing:3px;color:var(--slime);text-transform:uppercase;margin-bottom:6px;}
  .admin-field input,.admin-field textarea{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(107,143,62,.2);border-radius:4px;padding:10px 12px;color:var(--bone);font-family:'Space Mono',monospace;font-size:.72rem;outline:none;resize:none;}
  .admin-field input:focus,.admin-field textarea:focus{border-color:rgba(74,222,128,.4);}
  .admin-btn{width:100%;padding:12px;background:var(--green);border:1px solid rgba(74,222,128,.3);border-radius:4px;color:var(--bone);font-family:'Creepster',cursive;font-size:1rem;letter-spacing:3px;cursor:pointer;margin-top:6px;text-transform:uppercase;}
  .admin-btn.sm{font-size:.8rem;padding:10px;}
  .admin-btn.ghost{background:rgba(0,0,0,.4);}
  .admin-btn.danger{background:rgba(100,0,0,.4);border-color:rgba(204,34,0,.4);}
  .admin-close{position:absolute;top:16px;right:16px;background:none;border:none;color:rgba(232,220,200,.3);cursor:pointer;font-size:1rem;font-family:'Space Mono',monospace;}
  .s-divider{border-top:1px solid rgba(107,143,62,.1);margin:14px 0;padding-top:12px;}
  .s-label{font-size:.44rem;letter-spacing:3px;color:rgba(107,143,62,.45);text-transform:uppercase;margin-bottom:8px;}
  .admin-status{font-size:.52rem;margin-top:10px;letter-spacing:1px;color:var(--bright);display:none;}
  .admin-status.show{display:block;}
  .admin-status.err{color:var(--blood);}
</style>
</head>
<body>

<div class="card" id="mainCard" style="opacity:0;transition:opacity .3s">
  <div class="title" id="gobTitle">GOBINOS</div>

  <div class="closed-title">closed</div>
  <div class="closed-sub">
    <a href="https://x.com/gobinosoneth" target="_blank" style="color:rgba(107,143,62,.55);text-decoration:none;">@gobinosoneth</a>
  </div>

  <a href="/game" class="game-btn" id="gameBtn" style="display:none">enter the trenches</a>
  <div class="game-sub" id="gameSub" style="display:none">500 kills = goblist spot</div>

  <div class="divider" id="checkerSection" style="display:none">
    <div class="checker-label">check your spot</div>
    <div class="checker-row">
      <input class="checker-input" id="checkInput" placeholder="0x..." maxlength="42" autocomplete="off" spellcheck="false">
      <button class="checker-btn" id="checkBtn" onclick="doCheck()">check</button>
    </div>
    <div class="checker-result" id="checkResult"></div>
  </div>
</div>

<button class="admin-toggle" onclick="openAdmin()"></button>

<div class="admin-overlay" id="adminOverlay">
  <div class="admin-card">
    <button class="admin-close" onclick="closeAdmin()">x</button>
    <div class="admin-title">ADMIN</div>

    <div id="adminLogin">
      <div class="admin-field">
        <label>password</label>
        <input type="password" id="adminPass" placeholder="password" onkeydown="if(event.key==='Enter')checkPass()">
      </div>
      <button class="admin-btn" onclick="checkPass()">unlock</button>
      <div class="admin-status err" id="passErr">wrong password</div>
    </div>

    <div id="adminControls" style="display:none">

      <div class="s-label">checker</div>
      <button class="admin-btn sm" id="checkerBtn" onclick="toggleChecker()">checker: off</button>
      <button class="admin-btn sm" id="gameToggleBtn" onclick="toggleGame()" style="margin-top:4px;">game button: off</button>

      <div class="s-divider">
        <div class="s-label">export</div>
        <button class="admin-btn sm ghost" onclick="exportWallets('allowlist')">export allowlist</button>
        <button class="admin-btn sm ghost" onclick="exportWallets('masterlist')">export masterlist</button>
      </div>

      <div class="s-divider">
        <div class="s-label">import wallets</div>
        <div class="admin-field">
          <textarea id="importData" rows="4" placeholder="0x..."></textarea>
        </div>
        <div class="admin-field">
          <input id="importHandle" placeholder="@collab handle (optional)">
        </div>
        <button class="admin-btn sm" onclick="importWallets()">import</button>
      </div>

      <div class="s-divider">
        <div class="s-label">danger</div>
        <button class="admin-btn sm danger" onclick="clearPhase()">clear allowlist</button>
      </div>

      <div class="admin-status" id="adminStatus"></div>
    </div>
  </div>
</div>

<script>
var KEY='patLbPPbk4EctcB5l.94cf5b72ac496a6db920973e16b6d96500a99c6beb240f988fda855e6d14a960';
var BASE='appRp0o1yWMEMrhbO';
var TABLE='tblJTJZVtJS57rkGt';
var MASTERLIST='tblP9izXvEOZj29Gz';
var CONFIG='tblAMYHI1S6OTihNO';
var PASS='gobinos2024';
var checkerOn=false, gameOn=false, configId=null;

async function init(){
  try{
    var r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+CONFIG,{headers:{'Authorization':'Bearer '+KEY}});
    var d=await r.json();
    if(d.records&&d.records.length){configId=d.records[0].id;checkerOn=d.records[0].fields.Checker==='1';gameOn=d.records[0].fields.GameOn==='1';}applyGame();
    applyChecker();applyGame();
  }catch(e){}
  document.getElementById('mainCard').style.opacity='1';
}

function applyChecker(){
  document.getElementById('checkerSection').style.display=checkerOn?'block':'none';
  var b=document.getElementById('checkerBtn');
  if(b)b.textContent='checker: '+(checkerOn?'on':'off');
}

function applyGame(){
  document.getElementById('gameBtn').style.display=gameOn?'block':'none';
  document.getElementById('gameSub').style.display=gameOn?'block':'none';
  var b=document.getElementById('gameToggleBtn');
  if(b)b.textContent='game button: '+(gameOn?'on':'off');
}

function toggleGame(){
  gameOn=!gameOn;applyGame();
  var body={fields:{GameOn:gameOn?'1':'0'}};
  var url=configId?'https://api.airtable.com/v0/'+BASE+'/'+CONFIG+'/'+configId:'https://api.airtable.com/v0/'+BASE+'/'+CONFIG;
  fetch(url,{method:configId?'PATCH':'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  showStatus('game button '+(gameOn?'visible':'hidden'),false);
}

async function doCheck(){
  var w=document.getElementById('checkInput').value.trim();
  var res=document.getElementById('checkResult');
  var btn=document.getElementById('checkBtn');
  document.getElementById('checkInput').classList.remove('err');
  if(!/^0x[a-fA-F0-9]{40}$/.test(w)){document.getElementById('checkInput').classList.add('err');return;}
  btn.disabled=true;btn.textContent='...';
  try{
    var resp=await fetch('https://api.airtable.com/v0/'+BASE+'/'+MASTERLIST+'?filterByFormula=LOWER({Wallet})="'+w.toLowerCase()+'"',{headers:{'Authorization':'Bearer '+KEY}});
    var data=await resp.json();
    res.style.display='block';
    if(data.records&&data.records.length){
      res.style.cssText='display:block;background:rgba(42,92,42,.3);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:10px;border-radius:4px;text-align:center;font-size:.62rem;letter-spacing:2px;margin-top:10px;';
      res.textContent='ur in goblin';
    }else{
      res.style.cssText='display:block;background:rgba(80,0,0,.3);border:1px solid rgba(204,34,0,.3);color:#cc2200;padding:10px;border-radius:4px;text-align:center;font-size:.62rem;letter-spacing:2px;margin-top:10px;';
      res.textContent='ngmi ser';
    }
  }catch(e){res.style.display='block';res.style.color='#cc2200';res.textContent='try again';}
  btn.disabled=false;btn.textContent='check';
}

// admin open: triple-tap title or Shift+G+G
var tapC=0,tapT; document.getElementById('gobTitle').addEventListener('click',function(){tapC++;clearTimeout(tapT);tapT=setTimeout(function(){tapC=0;},600);if(tapC>=3){tapC=0;openAdmin();}});
var gC=0,gT; document.addEventListener('keydown',function(e){if(e.key==='G'&&e.shiftKey){gC++;clearTimeout(gT);gT=setTimeout(function(){gC=0;},800);if(gC>=2){gC=0;openAdmin();}}});

function openAdmin(){document.getElementById('adminOverlay').classList.add('show');}
function closeAdmin(){document.getElementById('adminOverlay').classList.remove('show');document.getElementById('adminLogin').style.display='block';document.getElementById('adminControls').style.display='none';document.getElementById('adminPass').value='';document.getElementById('passErr').style.display='none';}
function checkPass(){if(document.getElementById('adminPass').value===PASS){document.getElementById('adminLogin').style.display='none';document.getElementById('adminControls').style.display='block';applyChecker();}else{document.getElementById('passErr').style.display='block';}}

function toggleChecker(){
  checkerOn=!checkerOn;applyChecker();
  var body={fields:{Checker:checkerOn?'1':'0'}};
  var url=configId?'https://api.airtable.com/v0/'+BASE+'/'+CONFIG+'/'+configId:'https://api.airtable.com/v0/'+BASE+'/'+CONFIG;
  fetch(url,{method:configId?'PATCH':'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  showStatus(checkerOn?'checker enabled':'checker hidden',false);
}

async function exportWallets(type){
  var tbl=type==='masterlist'?MASTERLIST:TABLE,name='gobinos-'+type;
  showStatus('fetching...',false);
  try{
    var all=[],offset='';
    do{var u='https://api.airtable.com/v0/'+BASE+'/'+tbl+'?pageSize=100'+(offset?'&offset='+offset:'');var r=await fetch(u,{headers:{'Authorization':'Bearer '+KEY}});var d=await r.json();all=all.concat(d.records||[]);offset=d.offset||'';}while(offset);
    var lines=all.filter(function(r){return r.fields.Wallet;}).map(function(r){return r.fields.Wallet;});
    var blob=new Blob([lines.join('\n')],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name+'.txt';a.click();
    showStatus('exported '+lines.length,false);
  }catch(e){showStatus('failed',true);}
}

async function importWallets(){
  var raw=document.getElementById('importData').value.trim();
  var handle=document.getElementById('importHandle').value.trim()||'collab';
  if(!raw){showStatus('paste wallets first',true);return;}
  var wallets=raw.split(/[\n,]+/).map(function(w){return w.trim();}).filter(function(w){return /^0x[a-fA-F0-9]{40}$/.test(w);});
  if(!wallets.length){showStatus('no valid wallets',true);return;}
  showStatus('importing '+wallets.length+'...',false);
  var ok=0;
  for(var i=0;i<wallets.length;i++){
    var f={Twitter:handle,Wallet:wallets[i]};
    try{await fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify({fields:f})});await fetch('https://api.airtable.com/v0/'+BASE+'/'+MASTERLIST,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify({fields:f})});ok++;}catch(e){}
    if(i%10===0)showStatus('importing... '+ok+'/'+wallets.length,false);
  }
  showStatus('done. '+ok+' imported',false);document.getElementById('importData').value='';
}

async function clearPhase(){
  if(!confirm('delete all allowlist records? masterlist stays safe.'))return;
  showStatus('clearing...',false);
  try{
    var ids=[],offset='';
    do{var u='https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?pageSize=100'+(offset?'&offset='+offset:'');var r=await fetch(u,{headers:{'Authorization':'Bearer '+KEY}});var d=await r.json();ids=ids.concat((d.records||[]).map(function(r){return r.id;}));offset=d.offset||'';}while(offset);
    for(var i=0;i<ids.length;i+=10){var batch=ids.slice(i,i+10).map(function(id){return 'records[]='+id;}).join('&');await fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?'+batch,{method:'DELETE',headers:{'Authorization':'Bearer '+KEY}});}
    showStatus('cleared '+ids.length,false);
  }catch(e){showStatus('failed',true);}
}

function showStatus(msg,isErr){var el=document.getElementById('adminStatus');el.textContent=msg;el.className='admin-status show'+(isErr?' err':'');}

init();
</script>
</body>
</html>

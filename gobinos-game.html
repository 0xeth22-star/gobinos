.overlay {

.card {

<script>
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    this.beginPath();
    this.moveTo(x+r,y);
    this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);
    this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);
    this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);
    this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  }
}

// --- responsive sizing: tall mobile portrait lane ---
let GW, GH;
function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  // target ~9:16 portrait, fill screen
  GH=vh; GW=Math.min(vw, Math.round(vh*(9/16)));
  canvas.width=GW; canvas.height=GH;
  wrap.style.width=GW+'px'; wrap.style.height=GH+'px';
  LANE_W=Math.round(GW*0.52);
  LANE_X=(GW-LANE_W)/2;
  GOBLIN_Y=GH-Math.round(GH*0.13);
  GOBLIN_X=GW/2;
}
window.addEventListener('resize',()=>{ resize(); if(typeof drawStartBG==='function' && !gameRunning) drawStartBG(); });

let LANE_W, LANE_X, GOBLIN_Y, GOBLIN_X;
resize();

// goblin drawn via canvas

// game state
let score=0, wave=1, lives=3, gameRunning=false;
let enemies=[], projectiles=[], particles=[], missTexts=[];
let spawnTimer=0, waveTimer=0, lastTime=0;
let goblinAnim=0, hitFlash=0;

// ---- ENEMY ----
class Enemy {
  constructor(){
    this.x=LANE_X+Math.random()*LANE_W;
    this.y=-20;
    this.r=10+Math.random()*6;
    this.spd=1.2+wave*0.12+Math.random()*0.5;
    this.wobble=Math.random()*Math.PI*2;
    this.hp=(wave>=6)?2:1;
    this.flash=0; this.dead=false;
    this.scoreVal=1;
  }
  update(dt){
    this.y+=this.spd;
    this.wobble+=0.12;
    this.x+=Math.sin(this.wobble)*0.6;
    // keep in lane
    this.x=Math.max(LANE_X+this.r, Math.min(LANE_X+LANE_W-this.r, this.x));
    if(this.flash>0) this.flash-=dt;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    const s=Math.sin(this.wobble)*0.08;
    ctx.scale(1+s,1-s);
    // wings
    ctx.globalAlpha=0.55;
    ctx.fillStyle='#253d12';
    ctx.beginPath(); ctx.ellipse(-this.r*.6,-this.r*.4,this.r*.85,this.r*.28,-0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(this.r*.6,-this.r*.4,this.r*.85,this.r*.28,0.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // body
    ctx.fillStyle=this.flash>0?'#ff5544':'#1c3010';
    ctx.beginPath(); ctx.ellipse(0,0,this.r*.65,this.r*.48,0,0,Math.PI*2); ctx.fill();
    // stinger
    ctx.strokeStyle='#0a1505'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,this.r*.48); ctx.lineTo(0,this.r*1.2); ctx.stroke();
    // zombie eyes
    ctx.fillStyle='#ff1100';
    ctx.beginPath(); ctx.arc(-this.r*.22,0,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.r*.22,0,2.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ---- PROJECTILE (slash beam) ----
class Projectile {
  constructor(x,y){
    this.x=x; this.y=y;
    this.vy=-12-wave*.4;
    this.r=5; this.life=1; this.dead=false;
    this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    this.y+=this.vy;
    if(this.y<-20) this.dead=true;
  }
  draw(){
    // trail
    for(let i=0;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.5;
      ctx.globalAlpha=a;
      ctx.fillStyle='#4ade80';
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.r*(i/this.trail.length), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    // head glow
    ctx.shadowColor='#4ade80'; ctx.shadowBlur=12;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ---- PARTICLE ----
class Particle {
  constructor(x,y,col){
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    this.x=x; this.y=y;
    this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
    this.life=1; this.r=2+Math.random()*3;
    this.col=col||'#4ade80';
  }
  update(dt){ this.x+=this.vx; this.y+=this.vy; this.vy+=.25; this.life-=dt*2.5; }
  draw(){ ctx.globalAlpha=this.life; ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
}

// ---- MISS TEXT ----
class MissText {
  constructor(x,y){ this.x=x; this.y=y; this.life=1; }
  update(dt){ this.y-=1.2; this.life-=dt*2; }
  draw(){
    ctx.globalAlpha=this.life;
    ctx.fillStyle='#cc2200';
    ctx.font=`bold ${Math.round(GH*0.022)}px 'Space Mono'`;
    ctx.textAlign='center';
    ctx.fillText('MISS', this.x, this.y);
    ctx.globalAlpha=1;
  }
}

// ---- DRAW BACKGROUND ----
function drawBG(){
  // ---- GOBLIN CAVE / ETH TRENCH AESTHETIC ----
  // dark muddy background
  const bgGrad = ctx.createLinearGradient(0,0,0,GH);
  bgGrad.addColorStop(0,'#050a03');
  bgGrad.addColorStop(0.5,'#0a1206');
  bgGrad.addColorStop(1,'#070e04');
  ctx.fillStyle=bgGrad;
  ctx.fillRect(0,0,GW,GH);

  // outer cave walls - rough stone texture using rects
  const wallW = LANE_X;
  // left cave wall
  const stoneColors = ['#1a1f10','#151a0c','#1e2414','#121508','#202816'];
  for(let y=0;y<GH;y+=8){
    ctx.fillStyle = stoneColors[Math.floor(y/8)%stoneColors.length];
    ctx.fillRect(0, y, wallW, 8);
  }
  // right cave wall
  for(let y=0;y<GH;y+=8){
    ctx.fillStyle = stoneColors[(Math.floor(y/8)+2)%stoneColors.length];
    ctx.fillRect(LANE_X+LANE_W, y, GW-(LANE_X+LANE_W), 8);
  }

  // cave wall edge - jagged rock face (LEFT)
  ctx.fillStyle='#0d1208';
  for(let y=0;y<GH;y+=20){
    const jag = 6+Math.sin(y*0.3)*5+Math.cos(y*0.17)*4;
    ctx.fillRect(LANE_X-jag, y, jag+2, 22);
  }
  // rock edge highlight
  ctx.fillStyle='#2a3518';
  for(let y=0;y<GH;y+=40){
    ctx.fillRect(LANE_X-3, y, 3, 18);
  }

  // cave wall edge - jagged rock face (RIGHT)
  ctx.fillStyle='#0d1208';
  for(let y=0;y<GH;y+=20){
    const jag = 6+Math.sin(y*0.3+1.5)*5+Math.cos(y*0.19)*4;
    ctx.fillRect(LANE_X+LANE_W-2, y, jag+2, 22);
  }
  ctx.fillStyle='#2a3518';
  for(let y=0;y<GH;y+=40){
    ctx.fillRect(LANE_X+LANE_W, y+10, 3, 18);
  }

  // dripping slime on left wall
  ctx.fillStyle='rgba(74,222,128,0.15)';
  for(let i=0;i<4;i++){
    const dx = LANE_X - 8 - i*12;
    const dy = (i*137)%GH;
    const dh = 30+i*20;
    ctx.fillRect(dx, dy, 4, dh);
    // drip tip
    ctx.beginPath();
    ctx.arc(dx+2, dy+dh, 4, 0, Math.PI*2);
    ctx.fill();
  }
  // dripping slime on right wall
  for(let i=0;i<4;i++){
    const dx = LANE_X+LANE_W + 4 + i*10;
    const dy = (i*97+50)%GH;
    const dh = 25+i*15;
    ctx.fillRect(dx, dy, 4, dh);
    ctx.beginPath();
    ctx.arc(dx+2, dy+dh, 3, 0, Math.PI*2);
    ctx.fill();
  }

  // lane itself - dark muddy floor
  const laneGrad = ctx.createLinearGradient(LANE_X,0,LANE_X+LANE_W,0);
  laneGrad.addColorStop(0,'#0a1206');
  laneGrad.addColorStop(0.5,'#0e1a09');
  laneGrad.addColorStop(1,'#0a1206');
  ctx.fillStyle=laneGrad;
  ctx.fillRect(LANE_X,0,LANE_W,GH);

  // mud puddles / trench texture
  ctx.fillStyle='rgba(20,35,10,0.4)';
  for(let y=60;y<GH;y+=90){
    ctx.fillRect(LANE_X+LANE_W*0.1, y, LANE_W*0.8, 8);
    ctx.fillRect(LANE_X+LANE_W*0.2, y+12, LANE_W*0.5, 5);
  }

  // green slime glow from below (eth trench vibes)
  const glow=ctx.createRadialGradient(GW/2,GH,0,GW/2,GH,GH*0.5);
  glow.addColorStop(0,'rgba(42,92,42,0.12)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle=glow;
  ctx.fillRect(0,0,GW,GH);

  // skulls on walls (lore)
  ctx.fillStyle='rgba(200,190,160,0.25)';
  const skullPositions=[[LANE_X-wallW*0.5, GH*0.25],[LANE_X-wallW*0.4, GH*0.65],[LANE_X+LANE_W+wallW*0.35, GH*0.4],[LANE_X+LANE_W+wallW*0.45, GH*0.8]];
  for(const [sx,sy] of skullPositions){
    ctx.beginPath(); ctx.arc(sx,sy,7,0,Math.PI*2); ctx.fill();
    ctx.fillRect(sx-5,sy+5,10,5);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.arc(sx-3,sy-1,2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+3,sy-1,2,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(200,190,160,0.25)';
  }
}

function drawHUD(){
  const fs=Math.round(GH*0.024);
  // score — inside lane, above goblin
  ctx.font=`${fs}px 'Space Mono'`;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(74,222,128,0.85)';
  ctx.fillText(String(score).padStart(6,'0'), GW/2, GH-Math.round(GH*0.05));

  // lives — top of lane
  ctx.font=`${Math.round(GH*0.026)}px serif`;
  ctx.textAlign='left';
  for(let i=0;i<3;i++){
    ctx.fillText(i<lives?'💚':'🖤', LANE_X+10+i*Math.round(GH*0.035), Math.round(GH*0.052));
  }

  // wave — top right of lane
  ctx.font=`${Math.round(GH*0.017)}px 'Space Mono'`;
  ctx.textAlign='right';
  ctx.fillStyle='rgba(107,143,62,0.8)';
  ctx.fillText('W'+wave, LANE_X+LANE_W-10, Math.round(GH*0.052));

  // progress bar toward 500
  const barW=LANE_W*0.6, barH=5;
  const bx=LANE_X+LANE_W*0.2, by=GH-Math.round(GH*0.035);
  ctx.fillStyle='rgba(74,222,128,0.15)';
  ctx.fillRect(bx,by,barW,barH);
  ctx.fillStyle='rgba(74,222,128,0.6)';
  ctx.fillRect(bx,by,barW*(score/WIN_SCORE),barH);
}

// ---- INPUT ----
let touchStartX=null, touchStartTime=0;
let goblinTargetX=null;
var keys={};

document.addEventListener('keydown', e=>{ keys[e.key]=true; });
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

// tap = shoot, drag = move
function scaleX(clientX){
  const rect=canvas.getBoundingClientRect();
  return (clientX-rect.left)*(canvas.width/rect.width);
}

// auto-shoot interval — fires every 80ms while finger is down
let autoShootInterval=null;
function startAutoShoot(){ 
  if(autoShootInterval) return;
  shoot(); // fire immediately on touch
  autoShootInterval=setInterval(()=>{ if(gameRunning) shoot(); }, 80);
}
function stopAutoShoot(){ 
  clearInterval(autoShootInterval); 
  autoShootInterval=null; 
}

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const tx=scaleX(e.touches[0].clientX);
  touchStartX=tx; touchStartTime=Date.now();
  if(gameRunning){
    GOBLIN_X=Math.max(LANE_X+20, Math.min(LANE_X+LANE_W-20, tx));
    startAutoShoot();
  }
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  if(!gameRunning) return;
  const tx=scaleX(e.touches[0].clientX);
  GOBLIN_X=Math.max(LANE_X+20, Math.min(LANE_X+LANE_W-20, tx));
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  stopAutoShoot();
},{passive:false});

canvas.addEventListener('touchcancel', e=>{
  stopAutoShoot();
},{passive:false});

canvas.addEventListener('click', e=>{
  if(!gameRunning) return;
  shoot();
});

canvas.addEventListener('mousemove', e=>{
  if(!gameRunning) return;
  const mx=scaleX(e.clientX);
  if(mx>LANE_X && mx<LANE_X+LANE_W) GOBLIN_X=mx;
});

function shoot(){
  if(!gameRunning) return;
  const sy = GOBLIN_Y - Math.round(GH*0.1);
  projectiles.push(new Projectile(GOBLIN_X, sy));
}

// ---- GAME LOOP ----
function gameLoop(ts){
  if(!gameRunning) return;
  const dt=Math.min((ts-lastTime)/1000, .05);
  lastTime=ts;

  goblinAnim+=dt*3;
  if(hitFlash>0) hitFlash-=dt;

  // keyboard movement
  const moveSpd=GW*0.6*dt;
  if(keys['ArrowLeft']||keys['a']||keys['A']){
    GOBLIN_X=Math.max(LANE_X+20, GOBLIN_X-moveSpd);
  }
  if(keys['ArrowRight']||keys['d']||keys['D']){
    GOBLIN_X=Math.min(LANE_X+LANE_W-20, GOBLIN_X+moveSpd);
  }
  if(keys[' ']){
    if(!keys._spaceWas) shoot();
    keys._spaceWas=true;
  } else { keys._spaceWas=false; }

  // continuous shoot while finger held on screen
  if(touchHeld){
    const now=Date.now();
    // handled by interval{ autoShootTimer=now; shoot(); }
  }

  // spawn
  const rate=Math.max(0.3, 1.8-wave*0.12);
  spawnTimer+=dt;
  if(spawnTimer>=rate){
    spawnTimer=0;
    const n=Math.min(Math.floor(wave/3)+1,4);
    for(let i=0;i<n;i++) enemies.push(new Enemy());
  }
  // wave progression
  waveTimer+=dt;
  if(waveTimer>=20){ waveTimer=0; wave++; }

  // update
  for(const e of enemies) e.update(dt);
  for(const p of projectiles) p.update();
  for(const p of particles) p.update(dt);
  for(const m of missTexts) m.update(dt);

  // collision: projectile vs enemy
  for(const p of projectiles){
    if(p.dead) continue;
    for(const e of enemies){
      if(e.dead) continue;
      if(Math.hypot(p.x-e.x, p.y-e.y)<e.r+p.r){
        p.dead=true;
        e.hp--; e.flash=0.18;
        if(e.hp<=0){
          e.dead=true; score++;
          for(let i=0;i<10;i++) particles.push(new Particle(e.x,e.y,Math.random()>.5?'#4ade80':'#2a5c2a'));
          if(score>=WIN_SCORE){ winGame(); return; }
        }
        break;
      }
    }
  }

  // enemy reaches goblin
  const goblinR=Math.round(GH*0.065);
  for(const e of enemies){
    if(e.dead) continue;
    if(e.y>GOBLIN_Y-goblinR-e.r){
      e.dead=true; lives--;
      hitFlash=0.4; goblinShake();
      missTexts.push(new MissText(e.x, GOBLIN_Y-goblinR*2));
      if(lives<=0){ gameOver(); return; }
    }
  }

  // clean
  enemies=enemies.filter(e=>!e.dead);
  projectiles=projectiles.filter(p=>!p.dead);
  particles=particles.filter(p=>p.life>0);
  missTexts=missTexts.filter(m=>m.life>0);

  // draw
  drawBG();
  for(const e of enemies) e.draw();
  for(const p of projectiles) p.draw();
  for(const part of particles) part.draw();
  for(const m of missTexts) m.draw();
  drawGoblin();
  drawHUD();

  requestAnimationFrame(gameLoop);
}

let shakeOff=0;
function goblinShake(){
  shakeOff=8;
  const orig=GOBLIN_X;
  const iv=setInterval(()=>{
    GOBLIN_X=orig+(Math.random()-.5)*shakeOff;
    shakeOff*=.7;
    if(shakeOff<0.5){ GOBLIN_X=orig; clearInterval(iv); }
  },40);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  score=0; wave=1; lives=3;
  enemies=[]; projectiles=[]; particles=[]; missTexts=[];
  spawnTimer=0; waveTimer=0;
  gameRunning=true;
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function restartGame(){
  document.getElementById('deadScreen').style.display='none';
  document.getElementById('winScreen').style.display='none';
  startGame();
}

function gameOver(){
  gameRunning=false;
  stopAutoShoot();
  document.getElementById('deadSub').textContent=score+' kills. mosquitos won.';
  document.getElementById('deadScreen').style.display='flex';
}

function winGame(){
  gameRunning=false;
  stopAutoShoot();
  document.getElementById('winScreen').style.display='flex';
}

async function claimSpot(){
  const wallet=document.getElementById('winWallet').value.trim();
  const twitter=document.getElementById('winTwitter').value.trim();
  const errEl=document.getElementById('winErr');
  const btn=document.getElementById('claimBtn');
  errEl.style.display='none';
  document.getElementById('winWallet').classList.remove('err');
  document.getElementById('winTwitter').classList.remove('err');
  if(!/^0x[a-fA-F0-9]{40}$/.test(wallet)){
    document.getElementById('winWallet').classList.add('err');
    errEl.textContent='enter a valid wallet'; errEl.style.display='block'; return;
  }
  if(!twitter){
    document.getElementById('winTwitter').classList.add('err');
    errEl.textContent='drop your handle'; errEl.style.display='block'; return;
  }
  btn.disabled=true; btn.textContent='locking in...';
  const post=(t)=>fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${t}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${AIRTABLE_API_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({fields:{Twitter:twitter,Wallet:wallet}})
  });
  try{
    await post(AIRTABLE_TABLE); await post(MASTERLIST);
    btn.textContent='ur in goblin'; btn.style.background='rgba(42,92,42,0.8)';
  } catch(e){ btn.disabled=false; btn.textContent='broke — try again'; }
}

function drawGoblin(){
  const x=GOBLIN_X, y=GOBLIN_Y;
  const bob=Math.sin(goblinAnim)*2.5;
  const size=Math.round(GH*0.1);
  ctx.save();
  ctx.translate(x, y+bob);
  if(hitFlash>0){ ctx.shadowColor='#ff2200'; ctx.shadowBlur=22; }
  ctx.imageSmoothingEnabled=false;
  if(goblinImg.complete && goblinImg.naturalWidth){
    ctx.drawImage(goblinImg, -size*0.6, -size*1.1, size*1.2, size*1.2);
  } else {
    ctx.fillStyle='#3a6e20'; ctx.fillRect(-size*0.5,-size*0.9,size,size);
  }
  ctx.shadowBlur=0;
  ctx.restore();
}

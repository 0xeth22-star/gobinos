<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gobinos — Slash or Die</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#0a0d07; display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; color:#e8dcc8; }
#wrap { position:relative; }
#gameCanvas { display:block; }
.overlay {
  position:absolute; inset:0; background:rgba(0,0,0,0.92);
  display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
}
.card {
  background:#0d0d0a; border:1px solid rgba(107,143,62,0.4);
  border-radius:6px; padding:36px 32px; width:100%; max-width:340px;
  text-align:center; position:relative;
}
.card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#4ade80,transparent); }
.o-title { font-family:'Creepster',cursive; font-size:2.2rem; color:#4ade80; letter-spacing:4px; margin-bottom:6px; }
.o-sub { font-size:0.58rem; color:rgba(232,220,200,0.45); letter-spacing:1px; line-height:2.2; margin-bottom:24px; }
.o-btn { width:100%; padding:14px; background:#2a5c2a; border:1px solid rgba(74,222,128,0.4); border-radius:4px; color:#e8dcc8; font-family:'Creepster',cursive; font-size:1.1rem; letter-spacing:3px; cursor:pointer; text-transform:uppercase; margin-top:8px; transition:all .2s; }
.o-btn:hover { box-shadow:0 0 14px rgba(74,222,128,.25); }
.o-btn.danger { background:rgba(80,0,0,.5); border-color:rgba(204,34,0,.4); font-size:.85rem; }
.o-input { width:100%; background:rgba(0,0,0,.5); border:1px solid rgba(107,143,62,.3); border-radius:4px; padding:12px 14px; color:#e8dcc8; font-family:'Space Mono',monospace; font-size:.78rem; outline:none; margin-bottom:8px; text-align:center; letter-spacing:1px; }
.o-input:focus { border-color:rgba(74,222,128,.5); }
.o-input.err { border-color:rgba(204,34,0,.6); }
.o-err { font-size:.52rem; color:#cc2200; letter-spacing:1px; margin-bottom:8px; display:none; }
.badge { display:inline-block; background:rgba(107,143,62,.1); border:1px solid rgba(107,143,62,.25); border-radius:20px; padding:4px 14px; font-size:.48rem; letter-spacing:3px; color:#6b8f3e; text-transform:uppercase; margin-bottom:18px; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>

  <!-- Start -->
  <div class="overlay" id="startScreen">
    <div class="card">
      <div class="o-title">GOBINOS</div>
      <div class="badge">slash or die</div>
      <div class="o-sub">zombie mosquitos dropping from above<br>tap to slash them before they reach you<br>500 kills = guaranteed goblist spot</div>
      <button class="o-btn" onclick="startGame()">enter the trenches</button>
    </div>
  </div>

  <!-- Dead -->
  <div class="overlay" id="deadScreen" style="display:none">
    <div class="card">
      <div class="o-title" style="color:#cc2200">ngmi</div>
      <div class="o-sub" id="deadSub"></div>
      <button class="o-btn" onclick="restartGame()">try again</button>
    </div>
  </div>

  <!-- Win -->
  <div class="overlay" id="winScreen" style="display:none">
    <div class="card">
      <div class="o-title">gm goblin</div>
      <div class="o-sub">500 kills. you earned it.<br>drop your wallet — goblist locked</div>
      <input class="o-input" id="winWallet" placeholder="0x..." maxlength="42" autocomplete="off" spellcheck="false">
      <input class="o-input" id="winTwitter" placeholder="@handle" maxlength="50" autocomplete="off" spellcheck="false">
      <div class="o-err" id="winErr"></div>
      <button class="o-btn" id="claimBtn" onclick="claimSpot()">claim my spot</button>
      <button class="o-btn danger" onclick="restartGame()">play again</button>
    </div>
  </div>
</div>

// --- responsive sizing: tall mobile portrait lane ---
let GW, GH;
function resize(){
  const vw=window.innerWidth, vh=window.innerHeight;
  // target ~9:16 portrait, fill screen
  GH=vh; GW=Math.min(vw, Math.round(vh*(9/16)));
  canvas.width=GW; canvas.height=GH;
  wrap.style.width=GW+'px'; wrap.style.height=GH+'px';
  LANE_W=Math.round(GW*0.52);
  LANE_X=(GW-LANE_W)/2;
  GOBLIN_Y=GH-Math.round(GH*0.13);
  GOBLIN_X=GW/2;
}
window.addEventListener('resize',()=>{resize(); if(!gameRunning) drawStartBG();});

// game state
let score=0, wave=1, lives=3, gameRunning=false;
let enemies=[], projectiles=[], particles=[], missTexts=[];
let spawnTimer=0, waveTimer=0, lastTime=0;
let goblinAnim=0, hitFlash=0;

// ---- ENEMY ----
class Enemy {
  constructor(){
    this.x=LANE_X+Math.random()*LANE_W;
    this.y=-20;
    this.r=10+Math.random()*6;
    this.spd=1.2+wave*0.12+Math.random()*0.5;
    this.wobble=Math.random()*Math.PI*2;
    this.hp=(wave>=6)?2:1;
    this.flash=0; this.dead=false;
    this.scoreVal=1;
  }
  update(dt){
    this.y+=this.spd;
    this.wobble+=0.12;
    this.x+=Math.sin(this.wobble)*0.6;
    // keep in lane
    this.x=Math.max(LANE_X+this.r, Math.min(LANE_X+LANE_W-this.r, this.x));
    if(this.flash>0) this.flash-=dt;
  }
  draw(){
    ctx.save();
    ctx.translate(this.x, this.y);
    const s=Math.sin(this.wobble)*0.08;
    ctx.scale(1+s,1-s);
    // wings
    ctx.globalAlpha=0.55;
    ctx.fillStyle='#253d12';
    ctx.beginPath(); ctx.ellipse(-this.r*.6,-this.r*.4,this.r*.85,this.r*.28,-0.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(this.r*.6,-this.r*.4,this.r*.85,this.r*.28,0.5,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
    // body
    ctx.fillStyle=this.flash>0?'#ff5544':'#1c3010';
    ctx.beginPath(); ctx.ellipse(0,0,this.r*.65,this.r*.48,0,0,Math.PI*2); ctx.fill();
    // stinger
    ctx.strokeStyle='#0a1505'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(0,this.r*.48); ctx.lineTo(0,this.r*1.2); ctx.stroke();
    // zombie eyes
    ctx.fillStyle='#ff1100';
    ctx.beginPath(); ctx.arc(-this.r*.22,0,2.2,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(this.r*.22,0,2.2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ---- PROJECTILE (slash beam) ----
class Projectile {
  constructor(x,y){
    this.x=x; this.y=y;
    this.vy=-12-wave*.4;
    this.r=5; this.life=1; this.dead=false;
    this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>10) this.trail.shift();
    this.y+=this.vy;
    if(this.y<-20) this.dead=true;
  }
  draw(){
    // trail
    for(let i=0;i<this.trail.length;i++){
      const a=(i/this.trail.length)*0.5;
      ctx.globalAlpha=a;
      ctx.fillStyle='#4ade80';
      ctx.beginPath();
      ctx.arc(this.trail[i].x, this.trail[i].y, this.r*(i/this.trail.length), 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha=1;
    // head glow
    ctx.shadowColor='#4ade80'; ctx.shadowBlur=12;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
  }
}

// ---- PARTICLE ----
class Particle {
  constructor(x,y,col){
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*5;
    this.x=x; this.y=y;
    this.vx=Math.cos(a)*spd; this.vy=Math.sin(a)*spd;
    this.life=1; this.r=2+Math.random()*3;
    this.col=col||'#4ade80';
  }
  update(dt){ this.x+=this.vx; this.y+=this.vy; this.vy+=.25; this.life-=dt*2.5; }
  draw(){ ctx.globalAlpha=this.life; ctx.fillStyle=this.col; ctx.beginPath(); ctx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1; }
}

// ---- MISS TEXT ----
class MissText {
  constructor(x,y){ this.x=x; this.y=y; this.life=1; }
  update(dt){ this.y-=1.2; this.life-=dt*2; }
  draw(){
    ctx.globalAlpha=this.life;
    ctx.fillStyle='#cc2200';
    ctx.font=`bold ${Math.round(GH*0.022)}px 'Space Mono'`;
    ctx.textAlign='center';
    ctx.fillText('MISS', this.x, this.y);
    ctx.globalAlpha=1;
  }
}

// ---- DRAW BACKGROUND ----
function drawBG(){
  // dark base
  ctx.fillStyle='#0d1a0a';
  ctx.fillRect(0,0,GW,GH);

  // side walls (pixel style)
  const wallCol='#1a3010';
  const wallDark='#0e1f09';
  const spikes=18;
  
  // left wall
  ctx.fillStyle=wallDark;
  ctx.fillRect(0,0,LANE_X,GH);
  ctx.fillStyle=wallCol;
  ctx.fillRect(LANE_X-8,0,8,GH);
  // spike pattern on left
  ctx.fillStyle='#2a4a1a';
  for(let i=0;i<spikes;i++){
    const sy=(GH/spikes)*i;
    ctx.beginPath();
    ctx.moveTo(LANE_X,sy);
    ctx.lineTo(LANE_X-12,sy+GH/spikes/2);
    ctx.lineTo(LANE_X,sy+GH/spikes);
    ctx.fill();
  }

  // right wall
  ctx.fillStyle=wallDark;
  ctx.fillRect(LANE_X+LANE_W,0,GW-(LANE_X+LANE_W),GH);
  ctx.fillStyle=wallCol;
  ctx.fillRect(LANE_X+LANE_W,0,8,GH);
  ctx.fillStyle='#2a4a1a';
  for(let i=0;i<spikes;i++){
    const sy=(GH/spikes)*i;
    ctx.beginPath();
    ctx.moveTo(LANE_X+LANE_W,sy);
    ctx.lineTo(LANE_X+LANE_W+12,sy+GH/spikes/2);
    ctx.lineTo(LANE_X+LANE_W,sy+GH/spikes);
    ctx.fill();
  }

  // lane floor feel - subtle scanlines
  ctx.fillStyle='rgba(42,92,42,0.015)';
  for(let y=0;y<GH;y+=4){
    ctx.fillRect(LANE_X,y,LANE_W,2);
  }

  // lane center subtle glow
  const cg=ctx.createLinearGradient(LANE_X,0,LANE_X+LANE_W,0);
  cg.addColorStop(0,'transparent');
  cg.addColorStop(.5,'rgba(42,92,42,0.04)');
  cg.addColorStop(1,'transparent');
  ctx.fillStyle=cg;
  ctx.fillRect(LANE_X,0,LANE_W,GH);
}

function drawHUD(){
  // score bottom center
  ctx.font=`${Math.round(GH*0.025)}px 'Space Mono'`;
  ctx.textAlign='center';
  ctx.fillStyle='rgba(74,222,128,0.7)';
  ctx.fillText(String(score).padStart(6,'0'), GW/2, GH-Math.round(GH*0.025));

  // lives top left
  const heartSize=Math.round(GH*0.028);
  ctx.font=`${heartSize}px serif`;
  ctx.textAlign='left';
  for(let i=0;i<3;i++){
    ctx.fillText(i<lives?'🩸':'🖤', LANE_X+8+i*heartSize*1.4, Math.round(GH*0.055));
  }

  // wave top right
  ctx.font=`${Math.round(GH*0.018)}px 'Space Mono'`;
  ctx.textAlign='right';
  ctx.fillStyle='rgba(107,143,62,0.7)';
  ctx.fillText('WAVE '+wave, LANE_X+LANE_W-8, Math.round(GH*0.055));
}

function drawGoblin(){
  const r=Math.round(GH*0.065);
  const x=GOBLIN_X, y=GOBLIN_Y;
  const bob=Math.sin(goblinAnim)*3;

  if(hitFlash>0){
    ctx.shadowColor='#ff2200'; ctx.shadowBlur=30;
  }

  ctx.save();
  ctx.translate(x, y+bob);
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.clip();
  if(goblinImg.complete&&goblinImg.naturalWidth){
    ctx.drawImage(goblinImg,-r,-r,r*2,r*2);
  } else {
    ctx.fillStyle='#2a5c2a'; ctx.fill();
  }
  ctx.restore();
  ctx.shadowBlur=0;

  // shoot indicator
  if(gameRunning){
    ctx.strokeStyle='rgba(74,222,128,0.15)';
    ctx.lineWidth=1;
    ctx.setLineDash([3,7]);
    ctx.beginPath(); ctx.moveTo(x,y+bob-r-4); ctx.lineTo(x,y+bob-r-Math.round(GH*0.08)); ctx.stroke();
    ctx.setLineDash([]);
  }
}

function drawStartBG(){
  drawBG();
  drawGoblin();
}

// ---- INPUT ----
let shootTimer=0;
const SHOOT_RATE=0.28;

function handleTap(tx, ty){
  if(!gameRunning) return;
  // shoot from goblin toward tap x pos
  const sx=Math.max(LANE_X+6, Math.min(LANE_X+LANE_W-6, tx));
  projectiles.push(new Projectile(GOBLIN_X, GOBLIN_Y-Math.round(GH*0.065)));
}

canvas.addEventListener('click', e=>{
  const rect=canvas.getBoundingClientRect();
  handleTap(e.clientX-rect.left, e.clientY-rect.top);
});
canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  handleTap(e.touches[0].clientX-rect.left, e.touches[0].clientY-rect.top);
},{passive:false});

// ---- GAME LOOP ----
function gameLoop(ts){
  if(!gameRunning) return;
  const dt=Math.min((ts-lastTime)/1000, .05);
  lastTime=ts;

  goblinAnim+=dt*3;
  if(hitFlash>0) hitFlash-=dt;

  // spawn
  const rate=Math.max(0.3, 1.8-wave*0.12);
  spawnTimer+=dt;
  if(spawnTimer>=rate){
    spawnTimer=0;
    const n=Math.min(Math.floor(wave/3)+1,4);
    for(let i=0;i<n;i++) enemies.push(new Enemy());
  }
  // wave progression
  waveTimer+=dt;
  if(waveTimer>=20){ waveTimer=0; wave++; }

  // update
  for(const e of enemies) e.update(dt);
  for(const p of projectiles) p.update();
  for(const p of particles) p.update(dt);
  for(const m of missTexts) m.update(dt);

  // collision: projectile vs enemy
  for(const p of projectiles){
    if(p.dead) continue;
    for(const e of enemies){
      if(e.dead) continue;
      if(Math.hypot(p.x-e.x, p.y-e.y)<e.r+p.r){
        p.dead=true;
        e.hp--; e.flash=0.18;
        if(e.hp<=0){
          e.dead=true; score++;
          for(let i=0;i<10;i++) particles.push(new Particle(e.x,e.y,Math.random()>.5?'#4ade80':'#2a5c2a'));
          if(score>=WIN_SCORE){ winGame(); return; }
        }
        break;
      }
    }
  }

  // enemy reaches goblin
  const goblinR=Math.round(GH*0.065);
  for(const e of enemies){
    if(e.dead) continue;
    if(e.y>GOBLIN_Y-goblinR-e.r){
      e.dead=true; lives--;
      hitFlash=0.4; goblinShake();
      missTexts.push(new MissText(e.x, GOBLIN_Y-goblinR*2));
      if(lives<=0){ gameOver(); return; }
    }
  }

  // clean
  enemies=enemies.filter(e=>!e.dead);
  projectiles=projectiles.filter(p=>!p.dead);
  particles=particles.filter(p=>p.life>0);
  missTexts=missTexts.filter(m=>m.life>0);

  // draw
  drawBG();
  for(const e of enemies) e.draw();
  for(const p of projectiles) p.draw();
  for(const part of particles) part.draw();
  for(const m of missTexts) m.draw();
  drawGoblin();
  drawHUD();

  requestAnimationFrame(gameLoop);
}

let shakeOff=0;
function goblinShake(){
  shakeOff=8;
  const orig=GOBLIN_X;
  const iv=setInterval(()=>{
    GOBLIN_X=orig+(Math.random()-.5)*shakeOff;
    shakeOff*=.7;
    if(shakeOff<0.5){ GOBLIN_X=orig; clearInterval(iv); }
  },40);
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  score=0; wave=1; lives=3;
  enemies=[]; projectiles=[]; particles=[]; missTexts=[];
  spawnTimer=0; waveTimer=0;
  gameRunning=true;
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function restartGame(){
  document.getElementById('deadScreen').style.display='none';
  document.getElementById('winScreen').style.display='none';
  startGame();
}

function gameOver(){
  gameRunning=false;
  document.getElementById('deadSub').textContent=score+' kills. mosquitos won.';
  document.getElementById('deadScreen').style.display='flex';
}

function winGame(){
  gameRunning=false;
  document.getElementById('winScreen').style.display='flex';
}

async function claimSpot(){
  const wallet=document.getElementById('winWallet').value.trim();
  const twitter=document.getElementById('winTwitter').value.trim();
  const errEl=document.getElementById('winErr');
  const btn=document.getElementById('claimBtn');
  errEl.style.display='none';
  document.getElementById('winWallet').classList.remove('err');
  document.getElementById('winTwitter').classList.remove('err');
  if(!/^0x[a-fA-F0-9]{40}$/.test(wallet)){
    document.getElementById('winWallet').classList.add('err');
    errEl.textContent='enter a valid wallet'; errEl.style.display='block'; return;
  }
  if(!twitter){
    document.getElementById('winTwitter').classList.add('err');
    errEl.textContent='drop your handle'; errEl.style.display='block'; return;
  }
  btn.disabled=true; btn.textContent='locking in...';
  const post=(t)=>fetch(`https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${t}`,{
    method:'POST',
    headers:{'Authorization':`Bearer ${AIRTABLE_API_KEY}`,'Content-Type':'application/json'},
    body:JSON.stringify({fields:{Twitter:twitter,Wallet:wallet}})
  });
  try{
    await post(AIRTABLE_TABLE); await post(MASTERLIST);
    btn.textContent='ur in goblin'; btn.style.background='rgba(42,92,42,0.8)';
  } catch(e){ btn.disabled=false; btn.textContent='broke — try again'; }
}

// init bg on start screen
drawStartBG();
</script>

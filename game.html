html,body{width:100%;height:100%;overflow:hidden;background:#050a03;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:#e8dcc8;}

.card{background:#0d0d0a;border:1px solid rgba(107,143,62,0.4);border-radius:6px;padding:32px 28px;width:100%;max-width:320px;text-align:center;position:relative;}

.admin-label{font-size:.45rem;color:rgba(74,222,128,.4);letter-spacing:2px;margin-bottom:4px;}

<script>
// ---- CONSTANTS ----
var AIRTABLE_KEY='patLbPPbk4EctcB5l.94cf5b72ac496a6db920973e16b6d96500a99c6beb240f988fda855e6d14a960';
var BASE='appRp0o1yWMEMrhbO';
var TABLE='tblJTJZVtJS57rkGt';
var MASTERLIST='tblP9izXvEOZj29Gz';
var LEADERBOARD='tblOP5T8DCMDeV3Re';
var CONFIG_TABLE='tblAMYHI1S6OTihNO';
var WIN_SCORE=500;
var playerWallet='', playerHandle='';
var SESSION_TOKEN=null;
var WORKER_URL='https://gobinos-api.vercel.app';

// ---- SOUND SYSTEM ----
var _audioCtx=null;
var soundOn=true;

function getACtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}

function toggleMute(){
  soundOn=!soundOn;
  document.getElementById('muteBtn').textContent=soundOn?'♩♩':'ø♩';
}

// Gun / shoot: short sharp "pew"
function sndShoot(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var o=c.createOscillator();
    var g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='square';
    o.frequency.setValueAtTime(1200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.06);
    g.gain.setValueAtTime(0.18,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.07);
    o.start(c.currentTime); o.stop(c.currentTime+0.07);
  }catch(e){}
}

// Explosion: noise burst when enemy dies
function sndExplode(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var sr=c.sampleRate;
    var len=Math.floor(sr*0.18);
    var buf=c.createBuffer(1,len,sr);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-(i/len),1.5);
    var src=c.createBufferSource();
    src.buffer=buf;
    var filt=c.createBiquadFilter();
    filt.type='bandpass';
    filt.frequency.value=280;
    filt.Q.value=0.8;
    var g=c.createGain();
    g.gain.setValueAtTime(0.55,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.18);
    src.connect(filt); filt.connect(g); g.connect(c.destination);
    src.start(); src.stop(c.currentTime+0.18);
  }catch(e){}
}

// Hit: low thud when goblin takes damage
function sndHit(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var o=c.createOscillator();
    var g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(220,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(60,c.currentTime+0.22);
    g.gain.setValueAtTime(0.35,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);
    o.start(c.currentTime); o.stop(c.currentTime+0.22);
    // extra noise layer
    var sr=c.sampleRate;
    var len=Math.floor(sr*0.1);
    var buf=c.createBuffer(1,len,sr);
    var dd=buf.getChannelData(0);
    for(var i=0;i<len;i++) dd[i]=(Math.random()*2-1)*0.4;
    var src=c.createBufferSource(); src.buffer=buf;
    var g2=c.createGain();
    g2.gain.setValueAtTime(0.2,c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
    src.connect(g2); g2.connect(c.destination);
    src.start(); src.stop(c.currentTime+0.1);
  }catch(e){}
}

// Game over: descending doom tones
function sndGameOver(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var freqs=[440,330,247,185];
    freqs.forEach(function(f,i){
      var o=c.createOscillator();
      var g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='sawtooth';
      o.frequency.value=f;
      var t=c.currentTime+i*0.2;
      g.gain.setValueAtTime(0.22,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t); o.stop(t+0.28);
    });
  }catch(e){}
}

// Win: ascending goblin fanfare
function sndWin(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var notes=[523,659,784,1047,1319];
    notes.forEach(function(f,i){
      var o=c.createOscillator();
      var g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='triangle';
      o.frequency.value=f;
      var t=c.currentTime+i*0.1;
      g.gain.setValueAtTime(0.22,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t); o.stop(t+0.35);
    });
    // chord bloom at the end
    var chord=[523,659,784];
    chord.forEach(function(f){
      var o=c.createOscillator();
      var g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='sine';
      o.frequency.value=f;
      var t=c.currentTime+0.55;
      g.gain.setValueAtTime(0.12,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
      o.start(t); o.stop(t+0.8);
    });
  }catch(e){}
}

// ---- CANVAS SETUP ----
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('wrap');
var GW,GH,LANE_W,LANE_X,GOBLIN_Y;

function resize(){
  GH=window.innerHeight;
  GW=Math.min(window.innerWidth,Math.round(GH*(9/16)));
  canvas.width=GW; canvas.height=GH;
  wrap.style.width=GW+'px'; wrap.style.height=GH+'px';
  LANE_W=Math.round(GW*0.54);
  LANE_X=(GW-LANE_W)/2;
  GOBLIN_Y=GH-Math.round(GH*0.12);
}
resize();
window.addEventListener('resize',function(){ resize(); if(!gameRunning) drawBG(); });

// ---- GAME STATE ----
var score=0,wave=1,lives=3,gameRunning=false;
var GOBLIN_X=GW/2;
var enemies=[],projectiles=[],particles=[],missTexts=[];
var spawnTimer=0,waveTimer=0,lastTime=0;
var goblinAnim=0,hitFlash=0;
var keys={};
var hasPlayed=false;
var touchHeld=false,touchStartX=0,touchStartTime=0;
var autoShootTimer=0;
var gamePaused=false;

function startAutoShoot(){ touchHeld=true; }
function stopAutoShoot(){ touchHeld=false; }

function scaleX(cx){
  var r=canvas.getBoundingClientRect();
  return (cx-r.left)*(canvas.width/r.width);
}
function clampGoblin(x){
  return Math.max(LANE_X+22,Math.min(LANE_X+LANE_W-22,x));
}

document.getElementById('pauseBtn').addEventListener('touchend',function(e){
  e.preventDefault(); e.stopPropagation(); togglePause();
},{passive:false});
document.getElementById('pauseBtn').addEventListener('click',function(e){
  if(e._fromTouch) return; togglePause();
});

// ---- INPUT ----
document.addEventListener('keydown',function(e){ keys[e.key]=true; });
document.addEventListener('keyup',function(e){ keys[e.key]=false; });

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var tx=scaleX(e.touches[0].clientX);
  touchStartX=tx; touchStartTime=Date.now(); touchHeld=true;
  if(gameRunning){ GOBLIN_X=clampGoblin(tx); startAutoShoot(); }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!gameRunning) return;
  GOBLIN_X=clampGoblin(scaleX(e.touches[0].clientX));
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault(); touchHeld=false; stopAutoShoot();
  if(!gameRunning) return;
  var tx=scaleX(e.changedTouches[0].clientX);
  var moved=Math.abs(tx-touchStartX);
  if(Date.now()-touchStartTime<300 && moved<25) shoot();
},{passive:false});

canvas.addEventListener('click',function(e){
  if(!gameRunning) return; shoot();
});
canvas.addEventListener('mousedown',function(e){
  if(!gameRunning) return; startAutoShoot();
});
document.addEventListener('mouseup',function(){    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(42,92,42,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 80% 60% at 20% 50%, rgba(20,40,10,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 80% 60% at 80% 50%, rgba(20,40,10,0.4) 0%, transparent 60%);
  pointer-events:none;
  z-index:0;
}

canvas#bgCanvas{
  position:fixed;inset:0;
  width:100%;height:100%;

  z-index:0;

/* ---- main content ---- */
.site{
  position:relative;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:0;
  text-align:center;
  padding:0 24px;
}

/* goblin icon */
.goblin-icon{
  font-size:clamp(3rem,10vw,5rem);
  line-height:1;
  margin-bottom:20px;
  display:block;
  filter:drop-shadow(0 0 18px rgba(74,222,128,0.25));
  animation:gobBob 3s ease-in-out infinite;
}
@keyframes gobBob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* title */
.title{
  font-family:'Creepster',cursive;
  font-size:clamp(3.5rem,14vw,7rem);
  color:var(--bright);
  letter-spacing:6px;
  line-height:1;
  text-shadow:
    0 0 40px rgba(74,222,128,0.35),
    0 0 80px rgba(74,222,128,0.15);
  margin-bottom:12px;
  animation:flicker 6s infinite;
}
@keyframes flicker{
  0%,95%,100%{opacity:1;}
  96%{opacity:0.85;}
  97%{opacity:1;}
  98%{opacity:0.9;}
  99%{opacity:1;}
}

/* tagline */
.tagline{
  font-size:clamp(0.5rem,2vw,0.65rem);
  color:rgba(232,220,200,0.35);
  letter-spacing:4px;
  text-transform:uppercase;
  margin-bottom:48px;
}

/* enter button */
.enter-btn{
  display:inline-block;
  padding:18px 32px;
  background:rgba(30,74,30,0.6);
  border:1px solid rgba(74,222,128,0.45);
  border-radius:4px;
  color:var(--bone);
  font-family:'Creepster',cursive;
  white-space:nowrap;
  font-size:clamp(0.9rem,3.5vw,1.5rem);
  letter-spacing:5px;
  text-decoration:none;
  text-transform:uppercase;
  cursor:pointer;
  position:relative;
  transition:all 0.2s;
  box-shadow:0 0 30px rgba(74,222,128,0.08), inset 0 0 20px rgba(74,222,128,0.04);
}
.enter-btn::before{
  content:'';
  position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,222,128,0.6),transparent);
}
.enter-btn::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(74,222,128,0.3),transparent);
}
.enter-btn:hover{
  background:rgba(42,92,42,0.75);
  box-shadow:0 0 50px rgba(74,222,128,0.18), inset 0 0 30px rgba(74,222,128,0.08);
  transform:translateY(-2px);
  letter-spacing:7px;
}
.enter-btn:active{transform:translateY(0);}

/* checker section */
.checker-wrap{
  margin-top:32px;
  display:none;
  flex-direction:column;
  align-items:center;
  gap:8px;
  width:100%;
  max-width:320px;
}
.checker-label{
  font-size:0.42rem;
  letter-spacing:4px;
  color:rgba(107,143,62,0.5);
  text-transform:uppercase;
}
.checker-row{display:flex;gap:8px;width:100%;}
.checker-input{
  flex:1;
  background:rgba(0,0,0,0.45);
  border:1px solid rgba(107,143,62,0.2);
  border-radius:4px;
  padding:10px 12px;
  color:var(--bone);
  font-family:'Space Mono',monospace;
  font-size:0.68rem;
  outline:none;
  transition:border-color .2s;
}
.checker-input::placeholder{color:rgba(232,220,200,0.12);}
.checker-input:focus{border-color:rgba(74,222,128,0.4);}
.checker-input.err{border-color:rgba(204,34,0,0.5);}
.checker-btn{
  padding:10px 14px;
  background:rgba(30,74,30,0.5);
  border:1px solid rgba(74,222,128,0.3);
  border-radius:4px;
  color:var(--bone);
  font-family:'Creepster',cursive;
  font-size:0.9rem;
  letter-spacing:2px;
  cursor:pointer;
  transition:background .2s;
  white-space:nowrap;
}
.checker-btn:hover{background:rgba(42,92,42,0.7);}
.checker-btn:disabled{opacity:0.4;cursor:not-allowed;}
.checker-result{
  display:none;
  width:100%;
  padding:10px;
  border-radius:4px;
  font-size:0.6rem;
  letter-spacing:2px;
  text-align:center;
}

/* X link bottom */
.x-link{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  z-index:20;
  display:flex;
  align-items:center;
  gap:8px;
  color:rgba(232,220,200,0.3);
  text-decoration:none;
  font-size:0.5rem;
  letter-spacing:3px;
  text-transform:uppercase;
  transition:color .2s;
  padding:8px 16px;
}
.x-link:hover{color:rgba(232,220,200,0.7);}
.x-link svg{
  width:14px;height:14px;
  fill:currentColor;
  flex-shrink:0;
}

/* ---- admin ---- */
.admin-trigger{
  position:fixed;bottom:0;right:0;
  width:80px;height:80px;
  z-index:200;
  cursor:default;
  -webkit-tap-highlight-color:transparent;
}
.admin-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.88);
  z-index:100;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.admin-overlay.show{display:flex;}
.admin-card{
  background:#0a0d08;
  border:1px solid rgba(107,143,62,0.3);
  border-radius:6px;
  padding:32px;
  width:100%;max-width:400px;
  position:relative;
  max-height:88vh;
  overflow-y:auto;
}
.admin-title{
  font-family:'Creepster',cursive;
  font-size:1.4rem;
  color:var(--slime);
  letter-spacing:3px;
  margin-bottom:24px;
}
.admin-field{margin-bottom:14px;}
.admin-field label{
  display:block;
  font-size:.45rem;
  letter-spacing:3px;
  color:var(--slime);
  text-transform:uppercase;
  margin-bottom:6px;
}
.admin-field input,.admin-field textarea{
  width:100%;
  background:rgba(0,0,0,.5);
  border:1px solid rgba(107,143,62,.2);
  border-radius:4px;
  padding:10px 12px;
  color:var(--bone);
  font-family:'Space Mono',monospace;
  font-size:.72rem;
  outline:none;
  resize:none;
}
.admin-field input:focus,.admin-field textarea:focus{border-color:rgba(74,222,128,.4);}
.a-btn{
  width:100%;padding:12px;
  background:var(--green);
  border:1px solid rgba(74,222,128,.3);
  border-radius:4px;
  color:var(--bone);
  font-family:'Creepster',cursive;
  font-size:1rem;letter-spacing:3px;
  cursor:pointer;margin-top:6px;
  text-transform:uppercase;
}
.a-btn.sm{font-size:.8rem;padding:10px;}
.a-btn.ghost{background:rgba(0,0,0,.4);}
.a-btn.danger{background:rgba(100,0,0,.4);border-color:rgba(204,34,0,.4);}
.a-close{
  position:absolute;top:16px;right:16px;
  background:none;border:none;
  color:rgba(232,220,200,.3);
  cursor:pointer;font-size:1rem;
  font-family:'Space Mono',monospace;
}
.s-div{border-top:1px solid rgba(107,143,62,.1);margin:14px 0;padding-top:12px;}
.s-lbl{font-size:.44rem;letter-spacing:3px;color:rgba(107,143,62,.45);text-transform:uppercase;margin-bottom:8px;}
.a-status{font-size:.52rem;margin-top:10px;letter-spacing:1px;color:var(--bright);display:none;}
.a-status.show{display:block;}
.a-status.err{color:var(--blood);}
.a-err{font-size:.5rem;color:var(--blood);letter-spacing:1px;margin-top:4px;display:none;}
</style>
</head>

<script>
// ---- CONFIG ----
var KEY='patLbPPbk4EctcB5l.94cf5b72ac496a6db920973e16b6d96500a99c6beb240f988fda855e6d14a960';
var BASE='appRp0o1yWMEMrhbO';
var TABLE='tblJTJZVtJS57rkGt';
var MASTERLIST='tblP9izXvEOZj29Gz';
var CONFIG='tblAMYHI1S6OTihNO';
var PASS='gobinos2024';
var checkerOn=false, gameOn=false, configId=null;

// ---- INIT ----
async function init(){
  try{
    var r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+CONFIG,{headers:{'Authorization':'Bearer '+KEY}});
    var d=await r.json();
    if(d.records&&d.records.length){
      configId=d.records[0].id;
      checkerOn=d.records[0].fields.Checker==='1';
      gameOn=d.records[0].fields.GameOn==='1';
    }
    applyChecker();
    applyGame();
  }catch(e){}
}

function applyGame(){
  document.getElementById('enterBtn').style.display=gameOn?'inline-block':'none';
  document.getElementById('teaserBlock').style.display=gameOn?'none':'flex';
  var b=document.getElementById('gameToggleBtn');
  if(b) b.textContent='game: '+(gameOn?'live':'hidden');
}

function applyChecker(){
  document.getElementById('checkerWrap').style.display=checkerOn?'flex':'none';
  var b=document.getElementById('checkerToggleBtn');
  if(b) b.textContent='checker: '+(checkerOn?'on':'off');
}

// ---- CHECKER ----
async function doCheck(){
  var w=document.getElementById('checkInput').value.trim();
  var res=document.getElementById('checkResult');
  var btn=document.getElementById('checkBtn');
  document.getElementById('checkInput').classList.remove('err');
  if(!/^0x[a-fA-F0-9]{40}$/.test(w)){
    document.getElementById('checkInput').classList.add('err'); return;
  }
  btn.disabled=true; btn.textContent='...';
  try{
    var resp=await fetch('https://api.airtable.com/v0/'+BASE+'/'+MASTERLIST+'?filterByFormula=LOWER({Wallet})="'+w.toLowerCase()+'"',{headers:{'Authorization':'Bearer '+KEY}});
    var data=await resp.json();
    res.style.display='block';
    if(data.records&&data.records.length){
      res.style.cssText='display:block;background:rgba(42,92,42,.3);border:1px solid rgba(74,222,128,.3);color:#4ade80;padding:10px;border-radius:4px;text-align:center;font-size:.6rem;letter-spacing:2px;margin-top:4px;';
      res.textContent='ur GTD goblin 🧌';
    }else{
      res.style.cssText='display:block;background:rgba(80,0,0,.3);border:1px solid rgba(204,34,0,.3);color:#cc2200;padding:10px;border-radius:4px;text-align:center;font-size:.6rem;letter-spacing:2px;margin-top:4px;';
      res.textContent='ngmi ser';
    }
  }catch(e){ res.style.display='block'; res.style.color='#cc2200'; res.textContent='try again'; }
  btn.disabled=false; btn.textContent='check';
}

// ---- ADMIN ----
var tapC=0,tapT;
document.getElementById('adminTriggerEl').addEventListener('touchend',function(e){
  e.preventDefault(); adminTap();
},{passive:false});
function adminTap(){
  tapC++;
  clearTimeout(tapT);
  tapT=setTimeout(function(){tapC=0;},700);
  if(tapC>=3){tapC=0;openAdmin();}
}
var gC=0,gT;
document.addEventListener('keydown',function(e){
  if(e.key==='G'&&e.shiftKey){
    gC++;clearTimeout(gT);
    gT=setTimeout(function(){gC=0;},800);
    if(gC>=2){gC=0;openAdmin();}
  }
});
// triple-tap title too
document.getElementById('gobTitle').addEventListener('click',function(){
  tapC++;clearTimeout(tapT);
  tapT=setTimeout(function(){tapC=0;},600);
  if(tapC>=3){tapC=0;openAdmin();}
});

function openAdmin(){document.getElementById('adminOverlay').classList.add('show');}
function closeAdmin(){
  document.getElementById('adminOverlay').classList.remove('show');
  document.getElementById('adminLogin').style.display='block';
  document.getElementById('adminControls').style.display='none';
  document.getElementById('adminPass').value='';
  document.getElementById('passErr').style.display='none';
}
function checkPass(){
  if(document.getElementById('adminPass').value===PASS){
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminControls').style.display='block';
    applyChecker();
  }else{
    document.getElementById('passErr').style.display='block';
  }
}

function toggleGame(){
  gameOn=!gameOn; applyGame();
  var body={fields:{GameOn:gameOn?'1':'0'}};
  var url=configId?'https://api.airtable.com/v0/'+BASE+'/'+CONFIG+'/'+configId:'https://api.airtable.com/v0/'+BASE+'/'+CONFIG;
  fetch(url,{method:configId?'PATCH':'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  showStatus('game '+(gameOn?'live':'hidden'),false);
}

function toggleChecker(){
  checkerOn=!checkerOn; applyChecker();
  var body={fields:{Checker:checkerOn?'1':'0'}};
  var url=configId?'https://api.airtable.com/v0/'+BASE+'/'+CONFIG+'/'+configId:'https://api.airtable.com/v0/'+BASE+'/'+CONFIG;
  fetch(url,{method:configId?'PATCH':'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  showStatus('checker '+(checkerOn?'on':'off'),false);
}

async function exportWallets(type){
  var tbl=type==='masterlist'?MASTERLIST:TABLE;
  showStatus('fetching...',false);
  try{
    var all=[],offset='';
    do{
      var u='https://api.airtable.com/v0/'+BASE+'/'+tbl+'?pageSize=100'+(offset?'&offset='+offset:'');
      var r=await fetch(u,{headers:{'Authorization':'Bearer '+KEY}});
      var d=await r.json();
      all=all.concat(d.records||[]); offset=d.offset||'';
    }while(offset);
    var lines=all.filter(function(r){return r.fields.Wallet;}).map(function(r){return r.fields.Wallet;});
    var blob=new Blob([lines.join('\n')],{type:'text/plain'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download='gobinos-'+type+'.txt'; a.click();
    showStatus('exported '+lines.length,false);
  }catch(e){showStatus('failed',true);}
}

async function importWallets(){
  var raw=document.getElementById('importData').value.trim();
  var handle=document.getElementById('importHandle').value.trim()||'collab';
  if(!raw){showStatus('paste wallets first',true);return;}
  var wallets=raw.split(/[\n,]+/).map(function(w){return w.trim();}).filter(function(w){return /^0x[a-fA-F0-9]{40}$/.test(w);});
  if(!wallets.length){showStatus('no valid wallets',true);return;}
  showStatus('importing '+wallets.length+'...',false);
  var ok=0;
  for(var i=0;i<wallets.length;i++){
    var f={Twitter:handle,Wallet:wallets[i]};
    try{
      await fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify({fields:f})});
      await fetch('https://api.airtable.com/v0/'+BASE+'/'+MASTERLIST,{method:'POST',headers:{'Authorization':'Bearer '+KEY,'Content-Type':'application/json'},body:JSON.stringify({fields:f})});
      ok++;
    }catch(e){}
    if(i%10===0) showStatus('importing... '+ok+'/'+wallets.length,false);
  }
  showStatus('done. '+ok+' imported',false);
  document.getElementById('importData').value='';
}

async function clearPhase(){
  if(!confirm('delete all allowlist records? masterlist stays safe.')) return;
  showStatus('clearing...',false);
  try{
    var ids=[],offset='';
    do{
      var u='https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?pageSize=100'+(offset?'&offset='+offset:'');
      var r=await fetch(u,{headers:{'Authorization':'Bearer '+KEY}});
      var d=await r.json();
      ids=ids.concat((d.records||[]).map(function(r){return r.id;}));
      offset=d.offset||'';
    }while(offset);
    for(var i=0;i<ids.length;i+=10){
      var batch=ids.slice(i,i+10).map(function(id){return 'records[]='+id;}).join('&');
      await fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?'+batch,{method:'DELETE',headers:{'Authorization':'Bearer '+KEY}});
    }
    showStatus('cleared '+ids.length,false);
  }catch(e){showStatus('failed',true);}
}

function showStatus(msg,isErr){
  var el=document.getElementById('adminStatus');
  el.textContent=msg;
  el.className='a-status show'+(isErr?' err':'');
}

  <div class="overlay" id="deadScreen" style="display:none">

<script>
// ---- CONSTANTS ----
var AIRTABLE_KEY='patLbPPbk4EctcB5l.94cf5b72ac496a6db920973e16b6d96500a99c6beb240f988fda855e6d14a960';

// ---- SOUND SYSTEM ----
var _audioCtx=null;
var soundOn=true;

function getACtx(){
  if(!_audioCtx) _audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}

function toggleMute(){
  soundOn=!soundOn;
  document.getElementById('muteBtn').textContent=soundOn?'♩♩':'ø♩';
}

// Gun / shoot: short sharp "pew"
function sndShoot(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var o=c.createOscillator();
    var g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='square';
    o.frequency.setValueAtTime(1200,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(400,c.currentTime+0.06);
    g.gain.setValueAtTime(0.18,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.07);
    o.start(c.currentTime); o.stop(c.currentTime+0.07);
  }catch(e){}
}

// Explosion: noise burst when enemy dies
function sndExplode(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var sr=c.sampleRate;
    var len=Math.floor(sr*0.18);
    var buf=c.createBuffer(1,len,sr);
    var d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*Math.pow(1-(i/len),1.5);
    var src=c.createBufferSource();
    src.buffer=buf;
    var filt=c.createBiquadFilter();
    filt.type='bandpass';
    filt.frequency.value=280;
    filt.Q.value=0.8;
    var g=c.createGain();
    g.gain.setValueAtTime(0.55,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.18);
    src.connect(filt); filt.connect(g); g.connect(c.destination);
    src.start(); src.stop(c.currentTime+0.18);
  }catch(e){}
}

// Hit: low thud when goblin takes damage
function sndHit(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var o=c.createOscillator();
    var g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='sawtooth';
    o.frequency.setValueAtTime(220,c.currentTime);
    o.frequency.exponentialRampToValueAtTime(60,c.currentTime+0.22);
    g.gain.setValueAtTime(0.35,c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.22);
    o.start(c.currentTime); o.stop(c.currentTime+0.22);
    // extra noise layer
    var sr=c.sampleRate;
    var len=Math.floor(sr*0.1);
    var buf=c.createBuffer(1,len,sr);
    var dd=buf.getChannelData(0);
    for(var i=0;i<len;i++) dd[i]=(Math.random()*2-1)*0.4;
    var src=c.createBufferSource(); src.buffer=buf;
    var g2=c.createGain();
    g2.gain.setValueAtTime(0.2,c.currentTime);
    g2.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);
    src.connect(g2); g2.connect(c.destination);
    src.start(); src.stop(c.currentTime+0.1);
  }catch(e){}
}

// Game over: descending doom tones
function sndGameOver(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var freqs=[440,330,247,185];
    freqs.forEach(function(f,i){
      var o=c.createOscillator();
      var g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='sawtooth';
      o.frequency.value=f;
      var t=c.currentTime+i*0.2;
      g.gain.setValueAtTime(0.22,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.28);
      o.start(t); o.stop(t+0.28);
    });
  }catch(e){}
}

// Win: ascending goblin fanfare
function sndWin(){
  if(!soundOn) return;
  try{
    var c=getACtx();
    var notes=[523,659,784,1047,1319];
    notes.forEach(function(f,i){
      var o=c.createOscillator();
      var g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='triangle';
      o.frequency.value=f;
      var t=c.currentTime+i*0.1;
      g.gain.setValueAtTime(0.22,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
      o.start(t); o.stop(t+0.35);
    });
    // chord bloom at the end
    var chord=[523,659,784];
    chord.forEach(function(f){
      var o=c.createOscillator();
      var g=c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type='sine';
      o.frequency.value=f;
      var t=c.currentTime+0.55;
      g.gain.setValueAtTime(0.12,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.8);
      o.start(t); o.stop(t+0.8);
    });
  }catch(e){}
}

// ---- CANVAS SETUP ----
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('wrap');
var GW,GH,LANE_W,LANE_X,GOBLIN_Y;

function resize(){
  GH=window.innerHeight;
  GW=Math.min(window.innerWidth,Math.round(GH*(9/16)));
  canvas.width=GW; canvas.height=GH;
  wrap.style.width=GW+'px'; wrap.style.height=GH+'px';
  LANE_W=Math.round(GW*0.54);
  LANE_X=(GW-LANE_W)/2;
  GOBLIN_Y=GH-Math.round(GH*0.12);
}
resize();
window.addEventListener('resize',function(){ resize(); if(!gameRunning) drawBG(); });

// ---- GAME STATE ----
var score=0,wave=1,lives=3,gameRunning=false;
var GOBLIN_X=GW/2;
var enemies=[],projectiles=[],particles=[],missTexts=[];
var spawnTimer=0,waveTimer=0,lastTime=0;
var goblinAnim=0,hitFlash=0;
var keys={};
var hasPlayed=false;
var touchHeld=false,touchStartX=0,touchStartTime=0;
var autoShootTimer=0;
var gamePaused=false;

function startAutoShoot(){ touchHeld=true; }
function stopAutoShoot(){ touchHeld=false; }

function scaleX(cx){
  var r=canvas.getBoundingClientRect();
  return (cx-r.left)*(canvas.width/r.width);
}
function clampGoblin(x){
  return Math.max(LANE_X+22,Math.min(LANE_X+LANE_W-22,x));
}

document.getElementById('pauseBtn').addEventListener('touchend',function(e){
  e.preventDefault(); e.stopPropagation(); togglePause();
},{passive:false});
document.getElementById('pauseBtn').addEventListener('click',function(e){
  if(e._fromTouch) return; togglePause();
});

// ---- INPUT ----
document.addEventListener('keydown',function(e){ keys[e.key]=true; });
document.addEventListener('keyup',function(e){ keys[e.key]=false; });

canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var tx=scaleX(e.touches[0].clientX);
  touchStartX=tx; touchStartTime=Date.now(); touchHeld=true;
  if(gameRunning){ GOBLIN_X=clampGoblin(tx); startAutoShoot(); }
},{passive:false});

canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(!gameRunning) return;
  GOBLIN_X=clampGoblin(scaleX(e.touches[0].clientX));
},{passive:false});

canvas.addEventListener('touchend',function(e){
  e.preventDefault(); touchHeld=false; stopAutoShoot();
  if(!gameRunning) return;
  var tx=scaleX(e.changedTouches[0].clientX);
  var moved=Math.abs(tx-touchStartX);
  if(Date.now()-touchStartTime<300 && moved<25) shoot();
},{passive:false});

canvas.addEventListener('click',function(e){
  if(!gameRunning) return; shoot();
});
canvas.addEventListener('mousedown',function(e){
  if(!gameRunning) return; startAutoShoot();
});
document.addEventListener('mouseup',function(){ stopAutoShoot(); });
canvas.addEventListener('mousemove',function(e){
  if(!gameRunning) return;
  var mx=scaleX(e.clientX);
  if(mx>LANE_X && mx<LANE_X+LANE_W) GOBLIN_X=mx;
});

// ---- SHOOT ----
function shoot(){
  if(!gameRunning) return;
  sndShoot();
  projectiles.push({x:GOBLIN_X,y:GOBLIN_Y-GH*0.08,vy:-(14+wave*0.3),r:5,dead:false,trail:[]});
}

// ---- DRAW BG ----
function drawBG(){
  var g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#040803'); g.addColorStop(1,'#080f05');
  ctx.fillStyle=g; ctx.fillRect(0,0,GW,GH);
  for(var y=0;y<GH;y+=7){
    ctx.fillStyle=['#141a0c','#111608','#181f0f','#0f1307','#1a2210'][Math.floor(y/7)%5];
    ctx.fillRect(0,y,LANE_X,7);
  }
  for(var y=0;y<GH;y+=7){
    ctx.fillStyle=['#161c0e','#121709','#1a2110','#111508','#1c2413'][Math.floor(y/7)%5];
    ctx.fillRect(LANE_X+LANE_W,y,GW-(LANE_X+LANE_W),7);
  }
  ctx.fillStyle='#090e06';
  for(var y=0;y<GH;y+=18){
    var j=5+Math.sin(y*0.28)*4+Math.cos(y*0.15)*3;
    ctx.fillRect(LANE_X-j,y,j+1,20);
  }
  for(var y=0;y<GH;y+=18){
    var j=5+Math.sin(y*0.28+2)*4+Math.cos(y*0.18)*3;
    ctx.fillRect(LANE_X+LANE_W,y,j+1,20);
  }
  ctx.fillStyle='rgba(42,92,42,0.12)';
  ctx.fillRect(LANE_X-2,0,3,GH);
  ctx.fillRect(LANE_X+LANE_W-1,0,3,GH);
  var lg=ctx.createLinearGradient(LANE_X,0,LANE_X+LANE_W,0);
  lg.addColorStop(0,'#090f06'); lg.addColorStop(0.5,'#0c1508'); lg.addColorStop(1,'#090f06');
  ctx.fillStyle=lg; ctx.fillRect(LANE_X,0,LANE_W,GH);
  var fg=ctx.createRadialGradient(GW/2,GH,0,GW/2,GH,GH*0.45);
  fg.addColorStop(0,'rgba(42,92,42,0.14)'); fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg; ctx.fillRect(LANE_X,0,LANE_W,GH);
  ctx.fillStyle='rgba(74,222,128,0.12)';
  for(var i=0;i<3;i++){
    var dx=LANE_X-6-i*9,dy=(i*151)%GH,dh=28+i*18;
    ctx.fillRect(dx,dy,3,dh);
    ctx.beginPath(); ctx.arc(dx+1.5,dy+dh,3.5,0,Math.PI*2); ctx.fill();
  }
  for(var i=0;i<3;i++){
    var dx=LANE_X+LANE_W+3+i*9,dy=(i*103+60)%GH,dh=22+i*14;
    ctx.fillRect(dx,dy,3,dh);
    ctx.beginPath(); ctx.arc(dx+1.5,dy+dh,3,0,Math.PI*2); ctx.fill();
  }
  var skp=[[LANE_X*0.45,GH*0.22],[LANE_X*0.55,GH*0.62],[GW-(LANE_X*0.5),GH*0.38],[GW-(LANE_X*0.4),GH*0.78]];
  ctx.fillStyle='rgba(180,170,140,0.22)';
  for(var s=0;s<skp.length;s++){
    var sx=skp[s][0],sy=skp[s][1];
    ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fill();
    ctx.fillRect(sx-4,sy+5,8,4);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.arc(sx-2,sy-1,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+2,sy-1,1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(180,170,140,0.22)';
  }
}

// ---- DRAW GOBLIN ----
function drawGoblin(){
  var x=GOBLIN_X,y=GOBLIN_Y;
  var bob=Math.sin(goblinAnim)*2.5;
  var size=Math.round(GH*0.072);
  ctx.save();
  ctx.translate(x,y+bob);
  if(hitFlash>0){ ctx.shadowColor='#ff2200'; ctx.shadowBlur=24; }
  ctx.font=size+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('\u{1F9CC}',0,0);
  ctx.shadowBlur=0;
  ctx.restore();
}

// ---- DRAW ENEMY ----
function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x,e.y);
  var s=Math.sin(e.wobble)*0.07;
  ctx.scale(1+s,1-s);
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#1c3010';
  ctx.beginPath(); ctx.ellipse(-e.r*.55,-e.r*.35,e.r*.8,e.r*.25,-0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(e.r*.55,-e.r*.35,e.r*.8,e.r*.25,0.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle=e.flash>0?'#ff5533':'#1a2e0e';
  ctx.beginPath(); ctx.ellipse(0,0,e.r*.6,e.r*.45,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#0a1505'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,e.r*.45); ctx.lineTo(0,e.r*1.15); ctx.stroke();
  ctx.fillStyle='#ff1100';
  ctx.beginPath(); ctx.arc(-e.r*.2,0,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e.r*.2,0,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ---- DRAW PROJECTILE ----
function drawProjectile(p){
  for(var i=0;i<p.trail.length;i++){
    ctx.globalAlpha=(i/p.trail.length)*0.45;
    ctx.fillStyle='#4ade80';
    ctx.beginPath(); ctx.arc(p.trail[i].x,p.trail[i].y,p.r*(i/p.trail.length),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.shadowColor='#4ade80'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

// ---- HUD ----
function drawHUD(){
  var fs=Math.round(GH*0.023);
  ctx.font='bold '+fs+'px "Space Mono"';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(74,222,128,0.85)';
  ctx.fillText(String(score).padStart(6,'0'),GW/2,GH-Math.round(GH*0.042));
  var bw=LANE_W*0.58,bh=4,bx=LANE_X+LANE_W*0.21,by=GH-Math.round(GH*0.028);
  ctx.fillStyle='rgba(74,222,128,0.12)'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='rgba(74,222,128,0.55)'; ctx.fillRect(bx,by,bw*Math.min(score/WIN_SCORE,1),bh);
  ctx.font=Math.round(GH*0.028)+'px serif';
  ctx.textAlign='left';
  for(var i=0;i<3;i++) ctx.fillText(i<lives?'\u{1F9CC}':'\u{1F480}',LANE_X+8+i*Math.round(GH*0.036),Math.round(GH*0.052));
  ctx.font=Math.round(GH*0.016)+'px "Space Mono"';
  ctx.textAlign='right'; ctx.fillStyle='rgba(107,143,62,0.7)';
  ctx.fillText('W'+wave,LANE_X+LANE_W-8,Math.round(GH*0.05));
  // GTD progress hint
  var remaining=WIN_SCORE-score;
  if(remaining>0){
    ctx.font=Math.round(GH*0.013)+'px "Space Mono"';
    ctx.textAlign='center'; ctx.fillStyle='rgba(74,222,128,0.3)';
    ctx.fillText(remaining+' kills to GTD',GW/2,GH-Math.round(GH*0.055));
  }
}

// ---- GAME LOOP ----
function gameLoop(ts){
  if(!gameRunning) return;
  var dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  goblinAnim+=dt*3;
  if(hitFlash>0) hitFlash-=dt;

  var spd=GW*0.55*dt;
  if(keys['ArrowLeft']||keys['a']) GOBLIN_X=clampGoblin(GOBLIN_X-spd);
  if(keys['ArrowRight']||keys['d']) GOBLIN_X=clampGoblin(GOBLIN_X+spd);
  if(keys[' ']){ if(!keys._sw) shoot(); keys._sw=true; } else keys._sw=false;

  if(touchHeld){
    autoShootTimer+=dt;
    var shootRate=Math.max(0.055,0.28-(wave-1)*0.018);
    if(autoShootTimer>=shootRate){ autoShootTimer=0; shoot(); }
  } else { autoShootTimer=0; }

  spawnTimer+=dt;
  var rate=Math.max(0.45,1.7-wave*0.11);
  if(spawnTimer>=rate){
    spawnTimer=0;
    var n=Math.min(Math.floor(wave/4)+1,2);
    for(var i=0;i<n;i++){
      enemies.push({
        x:LANE_X+Math.random()*LANE_W,y:-18,
        r:10+Math.random()*5,
        spd:1.1+wave*0.11+Math.random()*0.45,
        wobble:Math.random()*Math.PI*2,
        hp:wave>=10?2:1,flash:0,dead:false
      });
    }
  }
  waveTimer+=dt;
  if(waveTimer>=20){ waveTimer=0; wave++; }

  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];
    e.y+=e.spd; e.wobble+=0.11;
    e.x+=Math.sin(e.wobble)*0.55;
    e.x=Math.max(LANE_X+e.r,Math.min(LANE_X+LANE_W-e.r,e.x));
    if(e.flash>0) e.flash-=dt;
  }
  for(var i=0;i<projectiles.length;i++){
    var p=projectiles[i];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>10) p.trail.shift();
    p.y+=p.vy;
    if(p.y<-20) p.dead=true;
  }
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life-=dt*2.4;
  }
  for(var i=0;i<missTexts.length;i++){
    var m=missTexts[i]; m.y-=1.1; m.life-=dt*2;
  }

  // collision: projectile vs enemy
  for(var pi=0;pi<projectiles.length;pi++){
    var p=projectiles[pi]; if(p.dead) continue;
    for(var ei=0;ei<enemies.length;ei++){
      var e=enemies[ei]; if(e.dead) continue;
      if(Math.hypot(p.x-e.x,p.y-e.y)<e.r+p.r){
        p.dead=true; e.hp--; e.flash=0.16;
        if(e.hp<=0){
          e.dead=true; score++;
          sndExplode();
          for(var k=0;k<8;k++){
            var a=Math.random()*Math.PI*2,sp=2+Math.random()*4;
            particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:2+Math.random()*2.5,col:Math.random()>.5?'#4ade80':'#2a7a2a'});
          }
          if(score>=WIN_SCORE){ winGame(); return; }
        }
        break;
      }
    }
  }

  // enemy reaches goblin
  var gr=Math.round(GH*0.05);
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i]; if(e.dead) continue;
    if(e.y>GOBLIN_Y-gr){
      e.dead=true; lives--;
      hitFlash=0.4;
      sndHit();
      missTexts.push({x:e.x,y:GOBLIN_Y-gr*2,life:1});
      if(lives<=0){ gameOver(); return; }
    }
  }

  enemies=enemies.filter(function(e){return !e.dead;});
  projectiles=projectiles.filter(function(p){return !p.dead;});
  particles=particles.filter(function(p){return p.life>0;});
  missTexts=missTexts.filter(function(m){return m.life>0;});

  drawBG();
  for(var i=0;i<enemies.length;i++) drawEnemy(enemies[i]);
  for(var i=0;i<projectiles.length;i++) drawProjectile(projectiles[i]);
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.font='bold '+Math.round(GH*0.02)+'px "Space Mono"';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  for(var i=0;i<missTexts.length;i++){
    var m=missTexts[i];
    ctx.globalAlpha=m.life; ctx.fillStyle='#cc2200';
    ctx.fillText('MISS',m.x,m.y);
  }
  ctx.globalAlpha=1;
  drawGoblin();
  drawHUD();
  requestAnimationFrame(gameLoop);
}

function loadLbData(){
  var list=document.getElementById('lbList');
  fetch('https://api.airtable.com/v0/'+BASE+'/'+LEADERBOARD+'?sort[0][field]=Score&sort[0][direction]=desc&pageSize=20',{
    headers:{'Authorization':'Bearer '+AIRTABLE_KEY}

    if(!d.records||!d.records.length){
      list.innerHTML='<div style="font-size:.55rem;color:rgba(74,222,128,.3);text-align:center;padding:20px;">no kills yet</div>';
      return;
    }
    var seen={},top=[];
    for(var i=0;i<d.records.length;i++){
      var r=d.records[i].fields;
      if(!r.Wallet) continue;
      var w=r.Wallet.toLowerCase();
      if(!seen[w]||(r.Score||0)>seen[w].score){
        seen[w]={handle:r.Twitter||'anon',wallet:r.Wallet,score:r.Score||0};
      }
    }
    for(var k in seen) top.push(seen[k]);
    top.sort(function(a,b){return b.score-a.score;});
    top=top.slice(0,10);
    var medals=['[1]','[2]','[3]'];
    var out='';
    for(var i=0;i<top.length;i++){
      var p=top[i];
      var rank=medals[i]||(i+1);
      var isTop=i<3;
      out+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-bottom:1px solid rgba(74,222,128,0.08);'+(isTop?'background:rgba(74,222,128,0.04);border-radius:4px;':'')+'">'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<span style="font-size:'+(isTop?'.9':'0.75')+'rem;min-width:24px;">'+rank+'</span>'+
          '<div>'+
            '<div style="font-size:.62rem;color:#e8dcc8;letter-spacing:1px;">'+escHtml(p.handle)+'</div>'+
            '<div style="font-size:.42rem;color:rgba(232,220,200,.3);letter-spacing:1px;">'+p.wallet.slice(0,6)+'...'+p.wallet.slice(-4)+'</div>'+
          '</div>'+
        '</div>'+
        '<div style="font-size:'+(isTop?'.75':'0.62')+'rem;color:#4ade80;font-weight:bold;letter-spacing:1px;">'+p.score+' kills</div>'+
      '</div>';
    }
    list.innerHTML=out;
  }).catch(function(){
    list.innerHTML='<div style="font-size:.55rem;color:#cc2200;text-align:center;padding:20px;">failed to load</div>';
  });
}

async function importWallets(){
  var raw=document.getElementById('importData').value.trim();
  var handle=document.getElementById('importHandle').value.trim()||'collab';
  var status=document.getElementById('importStatus');
  if(!raw){ status.textContent='paste some wallets first'; status.style.display='block'; return; }
  var wallets=raw.split(/[\n,]+/).map(function(w){return w.trim();}).filter(function(w){return /^0x[a-fA-F0-9]{40}$/.test(w);});
  if(!wallets.length){ status.textContent='no valid wallets found'; status.style.display='block'; return; }
  status.textContent='importing '+wallets.length+' wallets...'; status.style.display='block';
  var ok=0;
  for(var i=0;i<wallets.length;i++){
    var fields={Twitter:handle,Wallet:wallets[i]};
    try{
      await fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE,{method:'POST',headers:{'Authorization':'Bearer '+AIRTABLE_KEY,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
      await fetch('https://api.airtable.com/v0/'+BASE+'/'+MASTERLIST,{method:'POST',headers:{'Authorization':'Bearer '+AIRTABLE_KEY,'Content-Type':'application/json'},body:JSON.stringify({fields:fields})});
      ok++;
    }catch(e){}
    if(i%10===0) status.textContent='importing... '+ok+'/'+wallets.length;
  }
  status.textContent='done! '+ok+' wallets imported';
  document.getElementById('importData').value='';
}

  var btn=document.querySelector('#checkerScreen .o-btn');
  btn.textContent='checking...'; btn.disabled=true;
  fetch('https://api.airtable.com/v0/'+BASE+'/'+MASTERLIST+'?filterByFormula=LOWER({Wallet})="'+w.toLowerCase()+'"',{
    headers:{'Authorization':'Bearer '+AIRTABLE_KEY}
  }).then(function(r){return r.json();}).then(function(d){
    btn.textContent='check'; btn.disabled=false;
    res.style.display='block';
    if(d.records&&d.records.length){
      res.style.background='rgba(42,92,42,0.3)';
      res.style.border='1px solid rgba(74,222,128,0.4)';
      res.style.color='#4ade80';
      res.textContent='ur on the goblist 🧌';
    }else{
      res.style.background='rgba(80,0,0,0.3)';
      res.style.border='1px solid rgba(204,34,0,0.4)';
      res.style.color='#cc2200';
      res.textContent='ngmi. not on the list';
    }
  }).catch(function(){
    btn.textContent='check'; btn.disabled=false;
    err.textContent='something broke, try again'; err.style.display='block';
  });
}

// init: load WIN_SCORE from config
(function(){
  fetch('https://api.airtable.com/v0/'+BASE+'/'+CONFIG_TABLE+'?filterByFormula={Name}="WinScore"',{
    headers:{'Authorization':'Bearer '+AIRTABLE_KEY}
  }).then(function(r){return r.json();}).then(function(d){
    if(d.records&&d.records.length){
      var v=parseInt(d.records[0].fields.Value);
      if(v>0) WIN_SCORE=v;
      var el=document.getElementById('adminScore');
      if(el) el.value=WIN_SCORE;
    }
  }).catch(function(){});
})();
drawBG();
</script>

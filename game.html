<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Gobinos</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#050a03;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:#e8dcc8;}
#wrap{position:relative;}
#gameCanvas{display:block;}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,0.93);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.card{background:#0d0d0a;border:1px solid rgba(107,143,62,0.4);border-radius:6px;padding:32px 28px;width:100%;max-width:320px;text-align:center;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4ade80,transparent);}
.o-title{font-family:'Creepster',cursive;font-size:2.2rem;color:#4ade80;letter-spacing:4px;margin-bottom:6px;}
.o-sub{font-size:0.56rem;color:rgba(232,220,200,0.45);letter-spacing:1px;line-height:2.3;margin-bottom:20px;}
.o-btn{width:100%;padding:14px;background:#1e4a1e;border:1px solid rgba(74,222,128,0.35);border-radius:4px;color:#e8dcc8;font-family:'Creepster',cursive;font-size:1.1rem;letter-spacing:3px;cursor:pointer;text-transform:uppercase;margin-top:8px;transition:background .2s;}
.o-btn:hover{background:#2a5c2a;}
.o-btn.red{background:rgba(80,0,0,.5);border-color:rgba(204,34,0,.4);font-size:.85rem;}
.o-input{width:100%;background:rgba(0,0,0,.5);border:1px solid rgba(107,143,62,.3);border-radius:4px;padding:11px 14px;color:#e8dcc8;font-family:'Space Mono',monospace;font-size:.75rem;outline:none;margin-bottom:8px;text-align:center;letter-spacing:1px;}
.o-input:focus{border-color:rgba(74,222,128,.5);}
.o-input.err{border-color:rgba(204,34,0,.6);}
.o-err{font-size:.5rem;color:#cc2200;letter-spacing:1px;margin-bottom:8px;display:none;}
.badge{display:inline-block;background:rgba(107,143,62,.1);border:1px solid rgba(107,143,62,.25);border-radius:20px;padding:4px 14px;font-size:.46rem;letter-spacing:3px;color:#6b8f3e;text-transform:uppercase;margin-bottom:16px;}
.admin-label{font-size:.45rem;color:rgba(74,222,128,.4);letter-spacing:2px;margin-bottom:4px;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="gameCanvas"></canvas>

  <div class="overlay" id="startScreen">
    <div class="card">
      <div class="o-title">GOBINOS</div>
      <div class="o-sub" style="margin-bottom:16px;">goblins only no rules</div>
      <input class="o-input" id="startWallet" placeholder="0x... wallet" maxlength="42" autocomplete="off" spellcheck="false">
      <input class="o-input" id="startTwitter" placeholder="@handle" maxlength="50" autocomplete="off" spellcheck="false">
      <div class="o-err" id="startErr"></div>
      <button class="o-btn" onclick="validateAndStart()">enter the trenches</button>
      <button class="o-btn" onclick="showLeaderboard()" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.3);font-size:.75rem;padding:10px;margin-top:4px;letter-spacing:2px;color:rgba(74,222,128,0.8);">⚔ leaderboard</button>
    </div>
  </div>

  <div class="overlay" id="deadScreen" style="display:none">
    <div class="card">
      <div class="o-title" style="color:#cc2200">ngmi</div>
      <div class="o-sub" id="deadSub"></div>
      <button class="o-btn" onclick="restartGame()">try again</button>
      <button class="o-btn" onclick="showLeaderboard()" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.3);font-size:.75rem;padding:10px;margin-top:4px;letter-spacing:2px;color:rgba(74,222,128,0.8);">⚔ leaderboard</button>
    </div>
  </div>

  <div class="overlay" id="winScreen" style="display:none">
    <div class="card">
      <div class="o-title">gm goblin</div>
      <div class="o-sub">you survived. drop your wallet.</div>
      <input class="o-input" id="winWallet" placeholder="0x..." maxlength="42" autocomplete="off" spellcheck="false">
      <input class="o-input" id="winTwitter" placeholder="@handle" maxlength="50" autocomplete="off" spellcheck="false">
      <div class="o-err" id="winErr"></div>
      <button class="o-btn" id="claimBtn" onclick="claimSpot()">claim my spot</button>
      <button class="o-btn red" onclick="restartGame()">play again</button>

    </div>
  </div>
  <!-- Pause -->
  <div class="overlay" id="pauseScreen" style="display:none">
    <div class="card">
      <div class="o-title" style="font-size:1.6rem">paused</div>
      <div class="o-sub" style="margin-bottom:12px;" id="pauseScore"></div>
      <button class="o-btn" onclick="resumeGame()">resume</button>
      <button class="o-btn red" onclick="restartGame()">restart</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div class="overlay" id="lbScreen" style="display:none">
    <div class="card" style="max-width:360px;max-height:85vh;overflow-y:auto;">
      <div class="o-title" style="font-size:1.5rem;margin-bottom:4px;">leaderboard</div>
      <div style="font-size:.45rem;color:rgba(74,222,128,.4);letter-spacing:3px;margin-bottom:18px;">TOP GOBLINS</div>
      <div id="lbList" style="text-align:left;"></div>
      <button class="o-btn" onclick="document.getElementById('lbScreen').style.display='none'" style="margin-top:16px;font-size:.8rem;padding:10px;">back</button>
    </div>
  </div>

  <!-- Admin panel — triple-tap score to open -->
  <div class="overlay" id="adminScreen" style="display:none">
    <div class="card">
      <div class="o-title" style="font-size:1.4rem;color:rgba(74,222,128,.6)">admin</div>
      <div class="admin-label" style="margin-top:8px;">WIN SCORE</div>
      <input class="o-input" id="adminScore" value="500">
      <button class="o-btn" onclick="saveAdminScore()">save global</button>
      <button class="o-btn red" onclick="document.getElementById('adminScreen').style.display='none'">close</button>
    </div>
  </div>

  <!-- Pause button (visible during game) -->
  <button id="pauseBtn" onclick="togglePause()" style="display:none;position:absolute;top:10px;right:10px;z-index:40;background:rgba(10,20,8,0.85);border:1px solid rgba(74,222,128,0.25);border-radius:3px;color:rgba(74,222,128,0.8);font-size:0.7rem;padding:5px 9px;cursor:pointer;font-family:'Space Mono',monospace;letter-spacing:2px;">II</button>
</div>

<script>
// ---- CONSTANTS ----
var AIRTABLE_KEY='patLbPPbk4EctcB5l.94cf5b72ac496a6db920973e16b6d96500a99c6beb240f988fda855e6d14a960';
var BASE='appRp0o1yWMEMrhbO';
var TABLE='tblJTJZVtJS57rkGt';
var MASTERLIST='tblP9izXvEOZj29Gz';
var CONFIG_TABLE='tblAMYHI1S6OTihNO';
var WIN_SCORE=500;
var playerWallet='', playerHandle='';

// ---- CANVAS SETUP ----
var canvas=document.getElementById('gameCanvas');
var ctx=canvas.getContext('2d');
var wrap=document.getElementById('wrap');
var GW,GH,LANE_W,LANE_X,GOBLIN_Y;

function resize(){
  GH=window.innerHeight;
  GW=Math.min(window.innerWidth, Math.round(GH*(9/16)));
  canvas.width=GW; canvas.height=GH;
  wrap.style.width=GW+'px'; wrap.style.height=GH+'px';
  LANE_W=Math.round(GW*0.54);
  LANE_X=(GW-LANE_W)/2;
  GOBLIN_Y=GH-Math.round(GH*0.12);
}
resize();
window.addEventListener('resize', function(){
  resize();
  if(!gameRunning) drawBG();
});

// ---- GAME STATE ----
var score=0, wave=1, lives=3, gameRunning=false;
var GOBLIN_X=GW/2;
var enemies=[], projectiles=[], particles=[], missTexts=[];
var spawnTimer=0, waveTimer=0, lastTime=0;
var goblinAnim=0, hitFlash=0;
var keys={};
var touchHeld=false, touchStartX=0, touchStartTime=0;
var autoShootInterval=null;
var gamePaused=false;

function startAutoShoot(){
  if(autoShootInterval) return;
  autoShootInterval=setInterval(function(){ if(gameRunning&&!gamePaused) shoot(); },280);
}
function stopAutoShoot(){
  if(autoShootInterval){ clearInterval(autoShootInterval); autoShootInterval=null; }
}

// ---- HELPERS ----
function scaleX(cx){
  var r=canvas.getBoundingClientRect();
  return (cx-r.left)*(canvas.width/r.width);
}
function clampGoblin(x){
  return Math.max(LANE_X+22, Math.min(LANE_X+LANE_W-22, x));
}

// ---- INPUT ----
document.addEventListener('keydown', function(e){ keys[e.key]=true; });
document.addEventListener('keyup',   function(e){ keys[e.key]=false; });

canvas.addEventListener('touchstart', function(e){
  e.preventDefault();
  var tx=scaleX(e.touches[0].clientX);
  touchStartX=tx; touchStartTime=Date.now(); touchHeld=true;
  if(gameRunning){ GOBLIN_X=clampGoblin(tx); startAutoShoot(); }
},{passive:false});

canvas.addEventListener('touchmove', function(e){
  e.preventDefault();
  if(!gameRunning) return;
  GOBLIN_X=clampGoblin(scaleX(e.touches[0].clientX));
},{passive:false});

canvas.addEventListener('touchend', function(e){
  e.preventDefault(); touchHeld=false; stopAutoShoot();
  if(!gameRunning) return;
  var tx=scaleX(e.changedTouches[0].clientX);
  var moved=Math.abs(tx-touchStartX);
  if(Date.now()-touchStartTime<300 && moved<25) shoot();
},{passive:false});

canvas.addEventListener('click', function(e){
  if(!gameRunning) return; shoot();
});
// hold mouse to shoot continuously on desktop
canvas.addEventListener('mousedown', function(e){
  if(!gameRunning) return;
  startAutoShoot();
});
document.addEventListener('mouseup', function(){
  stopAutoShoot();
});
canvas.addEventListener('mousemove', function(e){
  if(!gameRunning) return;
  var mx=scaleX(e.clientX);
  if(mx>LANE_X && mx<LANE_X+LANE_W) GOBLIN_X=mx;
});

// ---- SHOOT ----
function shoot(){
  if(!gameRunning) return;
  projectiles.push({x:GOBLIN_X, y:GOBLIN_Y-GH*0.08, vy:-(14+wave*0.3), r:5, dead:false, trail:[]});
}

// ---- DRAW BG ----
function drawBG(){
  // cave walls
  var g=ctx.createLinearGradient(0,0,0,GH);
  g.addColorStop(0,'#040803'); g.addColorStop(1,'#080f05');
  ctx.fillStyle=g; ctx.fillRect(0,0,GW,GH);

  // left wall stone
  for(var y=0;y<GH;y+=7){
    ctx.fillStyle=['#141a0c','#111608','#181f0f','#0f1307','#1a2210'][Math.floor(y/7)%5];
    ctx.fillRect(0,y,LANE_X,7);
  }
  // right wall stone  
  for(var y=0;y<GH;y+=7){
    ctx.fillStyle=['#161c0e','#121709','#1a2110','#111508','#1c2413'][Math.floor(y/7)%5];
    ctx.fillRect(LANE_X+LANE_W,y,GW-(LANE_X+LANE_W),7);
  }

  // jagged left edge
  ctx.fillStyle='#090e06';
  for(var y=0;y<GH;y+=18){
    var j=5+Math.sin(y*0.28)*4+Math.cos(y*0.15)*3;
    ctx.fillRect(LANE_X-j,y,j+1,20);
  }
  // jagged right edge
  for(var y=0;y<GH;y+=18){
    var j=5+Math.sin(y*0.28+2)*4+Math.cos(y*0.18)*3;
    ctx.fillRect(LANE_X+LANE_W,y,j+1,20);
  }
  // wall edge glow strips
  ctx.fillStyle='rgba(42,92,42,0.12)';
  ctx.fillRect(LANE_X-2,0,3,GH);
  ctx.fillRect(LANE_X+LANE_W-1,0,3,GH);

  // lane
  var lg=ctx.createLinearGradient(LANE_X,0,LANE_X+LANE_W,0);
  lg.addColorStop(0,'#090f06'); lg.addColorStop(0.5,'#0c1508'); lg.addColorStop(1,'#090f06');
  ctx.fillStyle=lg; ctx.fillRect(LANE_X,0,LANE_W,GH);

  // floor glow
  var fg=ctx.createRadialGradient(GW/2,GH,0,GW/2,GH,GH*0.45);
  fg.addColorStop(0,'rgba(42,92,42,0.14)'); fg.addColorStop(1,'transparent');
  ctx.fillStyle=fg; ctx.fillRect(LANE_X,0,LANE_W,GH);

  // slime drips
  ctx.fillStyle='rgba(74,222,128,0.12)';
  for(var i=0;i<3;i++){
    var dx=LANE_X-6-i*9, dy=(i*151)%GH, dh=28+i*18;
    ctx.fillRect(dx,dy,3,dh);
    ctx.beginPath(); ctx.arc(dx+1.5,dy+dh,3.5,0,Math.PI*2); ctx.fill();
  }
  for(var i=0;i<3;i++){
    var dx=LANE_X+LANE_W+3+i*9, dy=(i*103+60)%GH, dh=22+i*14;
    ctx.fillRect(dx,dy,3,dh);
    ctx.beginPath(); ctx.arc(dx+1.5,dy+dh,3,0,Math.PI*2); ctx.fill();
  }

  // skulls on walls
  var skp=[[LANE_X*0.45,GH*0.22],[LANE_X*0.55,GH*0.62],[GW-(LANE_X*0.5),GH*0.38],[GW-(LANE_X*0.4),GH*0.78]];
  ctx.fillStyle='rgba(180,170,140,0.22)';
  for(var s=0;s<skp.length;s++){
    var sx=skp[s][0],sy=skp[s][1];
    ctx.beginPath(); ctx.arc(sx,sy,6,0,Math.PI*2); ctx.fill();
    ctx.fillRect(sx-4,sy+5,8,4);
    ctx.fillStyle='rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.arc(sx-2,sy-1,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(sx+2,sy-1,1.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(180,170,140,0.22)';
  }
}

// ---- DRAW GOBLIN (emoji 🧌) ----
function drawGoblin(){
  var x=GOBLIN_X, y=GOBLIN_Y;
  var bob=Math.sin(goblinAnim)*2.5;
  var size=Math.round(GH*0.072);
  ctx.save();
  ctx.translate(x, y+bob);
  if(hitFlash>0){ ctx.shadowColor='#ff2200'; ctx.shadowBlur=24; }
  ctx.font=size+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('\u{1F9CC}', 0, 0);
  ctx.shadowBlur=0;
  ctx.restore();
}

// ---- DRAW ENEMY (zombie mosquito) ----
function drawEnemy(e){
  ctx.save();
  ctx.translate(e.x, e.y);
  var s=Math.sin(e.wobble)*0.07;
  ctx.scale(1+s,1-s);
  // wings
  ctx.globalAlpha=0.5;
  ctx.fillStyle='#1c3010';
  ctx.beginPath(); ctx.ellipse(-e.r*.55,-e.r*.35,e.r*.8,e.r*.25,-0.5,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(e.r*.55,-e.r*.35,e.r*.8,e.r*.25,0.5,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  // body
  ctx.fillStyle=e.flash>0?'#ff5533':'#1a2e0e';
  ctx.beginPath(); ctx.ellipse(0,0,e.r*.6,e.r*.45,0,0,Math.PI*2); ctx.fill();
  // stinger
  ctx.strokeStyle='#0a1505'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(0,e.r*.45); ctx.lineTo(0,e.r*1.15); ctx.stroke();
  // red zombie eyes
  ctx.fillStyle='#ff1100';
  ctx.beginPath(); ctx.arc(-e.r*.2,0,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(e.r*.2,0,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ---- DRAW PROJECTILE ----
function drawProjectile(p){
  for(var i=0;i<p.trail.length;i++){
    ctx.globalAlpha=(i/p.trail.length)*0.45;
    ctx.fillStyle='#4ade80';
    ctx.beginPath(); ctx.arc(p.trail[i].x,p.trail[i].y,p.r*(i/p.trail.length),0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.shadowColor='#4ade80'; ctx.shadowBlur=10;
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
  ctx.shadowBlur=0;
}

// ---- HUD ----
function drawHUD(){
  var fs=Math.round(GH*0.023);
  // score
  ctx.font='bold '+fs+'px "Space Mono"';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillStyle='rgba(74,222,128,0.85)';
  ctx.fillText(String(score).padStart(6,'0'), GW/2, GH-Math.round(GH*0.042));
  // progress bar
  var bw=LANE_W*0.58, bh=4, bx=LANE_X+LANE_W*0.21, by=GH-Math.round(GH*0.028);
  ctx.fillStyle='rgba(74,222,128,0.12)'; ctx.fillRect(bx,by,bw,bh);
  ctx.fillStyle='rgba(74,222,128,0.55)'; ctx.fillRect(bx,by,bw*Math.min(score/WIN_SCORE,1),bh);
  // lives
  ctx.font=Math.round(GH*0.028)+'px serif';
  ctx.textAlign='left';
  for(var i=0;i<3;i++) ctx.fillText(i<lives?'\u{1F9CC}':'\u{1F480}', LANE_X+8+i*Math.round(GH*0.036), Math.round(GH*0.052));
  // wave
  ctx.font=Math.round(GH*0.016)+'px "Space Mono"';
  ctx.textAlign='right'; ctx.fillStyle='rgba(107,143,62,0.7)';
  ctx.fillText('W'+wave, LANE_X+LANE_W-8, Math.round(GH*0.05));
}

// ---- GAME LOOP ----
function gameLoop(ts){
  if(!gameRunning) return;
  var dt=Math.min((ts-lastTime)/1000, 0.05);
  lastTime=ts;
  goblinAnim+=dt*3;
  if(hitFlash>0) hitFlash-=dt;

  // keyboard
  var spd=GW*0.55*dt;
  if(keys['ArrowLeft']||keys['a']) GOBLIN_X=clampGoblin(GOBLIN_X-spd);
  if(keys['ArrowRight']||keys['d']) GOBLIN_X=clampGoblin(GOBLIN_X+spd);
  if(keys[' ']){ if(!keys._sw) shoot(); keys._sw=true; } else keys._sw=false;

  // spawn
  spawnTimer+=dt;
  var rate=Math.max(0.28, 1.7-wave*0.11);
  if(spawnTimer>=rate){
    spawnTimer=0;
    var n=Math.min(Math.floor(wave/3)+1,4);
    for(var i=0;i<n;i++){
      enemies.push({
        x:LANE_X+Math.random()*LANE_W, y:-18,
        r:10+Math.random()*5,
        spd:1.1+wave*0.11+Math.random()*0.45,
        wobble:Math.random()*Math.PI*2,
        hp:wave>=6?2:1, flash:0, dead:false
      });
    }
  }
  // wave
  waveTimer+=dt;
  if(waveTimer>=20){ waveTimer=0; wave++; }

  // update enemies
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];
    e.y+=e.spd; e.wobble+=0.11;
    e.x+=Math.sin(e.wobble)*0.55;
    e.x=Math.max(LANE_X+e.r, Math.min(LANE_X+LANE_W-e.r, e.x));
    if(e.flash>0) e.flash-=dt;
  }
  // update projectiles
  for(var i=0;i<projectiles.length;i++){
    var p=projectiles[i];
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>10) p.trail.shift();
    p.y+=p.vy;
    if(p.y<-20) p.dead=true;
  }
  // update particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.22; p.life-=dt*2.4;
  }
  // update miss texts
  for(var i=0;i<missTexts.length;i++){
    var m=missTexts[i]; m.y-=1.1; m.life-=dt*2;
  }

  // collision: projectile vs enemy
  for(var pi=0;pi<projectiles.length;pi++){
    var p=projectiles[pi]; if(p.dead) continue;
    for(var ei=0;ei<enemies.length;ei++){
      var e=enemies[ei]; if(e.dead) continue;
      if(Math.hypot(p.x-e.x,p.y-e.y)<e.r+p.r){
        p.dead=true; e.hp--; e.flash=0.16;
        if(e.hp<=0){
          e.dead=true; score++;
          for(var k=0;k<8;k++){
            var a=Math.random()*Math.PI*2, sp=2+Math.random()*4;
            particles.push({x:e.x,y:e.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,r:2+Math.random()*2.5,col:Math.random()>.5?'#4ade80':'#2a7a2a'});
          }
          if(score>=WIN_SCORE){ winGame(); return; }
        }
        break;
      }
    }
  }

  // enemy reaches goblin
  var gr=Math.round(GH*0.05);
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i]; if(e.dead) continue;
    if(e.y>GOBLIN_Y-gr){
      e.dead=true; lives--;
      hitFlash=0.4;
      missTexts.push({x:e.x, y:GOBLIN_Y-gr*2, life:1});
      if(lives<=0){ gameOver(); return; }
    }
  }

  // clean arrays
  enemies=enemies.filter(function(e){return !e.dead;});
  projectiles=projectiles.filter(function(p){return !p.dead;});
  particles=particles.filter(function(p){return p.life>0;});
  missTexts=missTexts.filter(function(m){return m.life>0;});

  // draw
  drawBG();
  for(var i=0;i<enemies.length;i++) drawEnemy(enemies[i]);
  for(var i=0;i<projectiles.length;i++) drawProjectile(projectiles[i]);
  // particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life; ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
  // miss texts
  ctx.font='bold '+Math.round(GH*0.02)+'px "Space Mono"';
  ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  for(var i=0;i<missTexts.length;i++){
    var m=missTexts[i];
    ctx.globalAlpha=m.life; ctx.fillStyle='#cc2200';
    ctx.fillText('MISS', m.x, m.y);
  }
  ctx.globalAlpha=1;
  drawGoblin();
  drawHUD();
  requestAnimationFrame(gameLoop);
}

// ---- GAME CONTROL ----
// triple-tap score to open admin
var scoreTapCount=0, scoreTapTimer=null;
function scoreTapped(){
  scoreTapCount++;
  if(scoreTapTimer) clearTimeout(scoreTapTimer);
  scoreTapTimer=setTimeout(function(){ scoreTapCount=0; },600);
  if(scoreTapCount>=3){
    scoreTapCount=0;
    document.getElementById('adminScreen').style.display='flex';
  }
}

// tap score area (bottom center of canvas)
canvas.addEventListener('click', function(e){
  var r=canvas.getBoundingClientRect();
  var cy=(e.clientY-r.top)*(canvas.height/r.height);
  if(cy>GH*0.88) scoreTapped();
}, true);
canvas.addEventListener('touchend', function(e){
  var r=canvas.getBoundingClientRect();
  var cy=(e.changedTouches[0].clientY-r.top)*(canvas.height/r.height);
  if(cy>GH*0.88) scoreTapped();
}, true);

function togglePause(){
  if(!gameRunning && !gamePaused) return;
  if(gamePaused){ resumeGame(); } else { pauseGame(); }
}
function pauseGame(){
  gamePaused=true; gameRunning=false; stopAutoShoot();
  document.getElementById('pauseScore').textContent=score+' kills so far';
  document.getElementById('pauseScreen').style.display='flex';
  document.getElementById('pauseBtn').textContent='GO';
}
function resumeGame(){
  document.getElementById('pauseScreen').style.display='none';
  gamePaused=false; gameRunning=true;
  document.getElementById('pauseBtn').textContent='II';
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}

function validateAndStart(){
  var w=document.getElementById('startWallet').value.trim();
  var t=document.getElementById('startTwitter').value.trim();
  var err=document.getElementById('startErr');
  err.style.display='none';
  document.getElementById('startWallet').classList.remove('err');
  document.getElementById('startTwitter').classList.remove('err');
  if(!/^0x[a-fA-F0-9]{40}$/.test(w)){
    document.getElementById('startWallet').classList.add('err');
    err.textContent='enter a valid wallet'; err.style.display='block'; return;
  }
  if(!t){
    document.getElementById('startTwitter').classList.add('err');
    err.textContent='drop your handle'; err.style.display='block'; return;
  }
  playerWallet=w; playerHandle=t;
  // remember for next time
  try{ localStorage.setItem('gobWallet',w); localStorage.setItem('gobHandle',t); } catch(e){}
  startGame();
}

// on load - check if returning user, skip form if already have wallet
(function(){
  try{
    var w=localStorage.getItem('gobWallet');
    var t=localStorage.getItem('gobHandle');
    if(w && t && /^0x[a-fA-F0-9]{40}$/.test(w)){
      playerWallet=w; playerHandle=t;
      // pre-fill but hide the fields, show "playing as" instead
      document.getElementById('startWallet').value=w;
      document.getElementById('startTwitter').value=t;
      var card=document.querySelector('#startScreen .card');
      var info=document.createElement('div');
      info.id='returningInfo';
      info.style='font-size:.52rem;color:rgba(74,222,128,.5);letter-spacing:1px;margin-bottom:12px;';
      info.innerHTML='playing as <span style="color:rgba(74,222,128,.8);">'+escHtml(t)+'</span> <a onclick="clearPlayer()" style="color:rgba(204,34,0,.6);cursor:pointer;text-decoration:underline;">not you?</a>';
      // hide inputs, show info
      document.getElementById('startWallet').style.display='none';
      document.getElementById('startTwitter').style.display='none';
      document.getElementById('startErr').style.display='none';
      card.insertBefore(info, document.getElementById('startWallet'));
    }
  } catch(e){}
})();

function clearPlayer(){
  try{ localStorage.removeItem('gobWallet'); localStorage.removeItem('gobHandle'); } catch(e){}
  playerWallet=''; playerHandle='';
  document.getElementById('startWallet').style.display='block';
  document.getElementById('startTwitter').style.display='block';
  var ri=document.getElementById('returningInfo');
  if(ri) ri.remove();
}

function startGame(){
  document.getElementById('startScreen').style.display='none';
  document.getElementById('pauseBtn').style.display='block';
  score=0; wave=1; lives=3;
  GOBLIN_X=GW/2; gamePaused=false;
  enemies=[]; projectiles=[]; particles=[]; missTexts=[];
  spawnTimer=0; waveTimer=0; touchHeld=false; stopAutoShoot();
  gameRunning=true;
  lastTime=performance.now();
  requestAnimationFrame(gameLoop);
}
function restartGame(){
  document.getElementById('deadScreen').style.display='none';
  document.getElementById('winScreen').style.display='none';
  document.getElementById('pauseScreen').style.display='none';
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('startScreen').style.display='flex';
  gameRunning=false; gamePaused=false; stopAutoShoot();
}
function gameOver(){
  gameRunning=false; stopAutoShoot();
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('deadSub').textContent=score+' kills mosquitos won';
  document.getElementById('deadScreen').style.display='flex';
  // submit score to leaderboard
  if(playerWallet && playerHandle){
    fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE,{
      method:'POST',
      headers:{'Authorization':'Bearer '+AIRTABLE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{Twitter:playerHandle,Wallet:playerWallet,Score:score}})
    }).catch(function(){});
  }
}
function winGame(){
  gameRunning=false; stopAutoShoot();
  document.getElementById('pauseBtn').style.display='none';
  document.getElementById('winInfo').textContent=playerHandle+' · '+playerWallet.slice(0,6)+'...'+playerWallet.slice(-4);
  document.getElementById('winScreen').style.display='flex';
}
async function claimSpot(){
  var btn=document.getElementById('claimBtn');
  var err=document.getElementById('winErr');
  btn.disabled=true; btn.textContent='locking in...';
  var post=function(t){
    return fetch('https://api.airtable.com/v0/'+BASE+'/'+t,{
      method:'POST',
      headers:{'Authorization':'Bearer '+AIRTABLE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{Twitter:playerHandle,Wallet:playerWallet,Score:score}})
    });
  };
  try{
    await post(TABLE); await post(MASTERLIST);
    btn.textContent='ur in goblin ⚔';
    btn.style.background='rgba(42,92,42,0.8)';
  } catch(e){ btn.disabled=false; btn.textContent='broke — try again'; }
}

// ---- LEADERBOARD ----
function showLeaderboard(){
  document.getElementById('lbScreen').style.display='flex';
  var list=document.getElementById('lbList');
  list.innerHTML='<div style="font-size:.55rem;color:rgba(74,222,128,.4);letter-spacing:2px;padding:12px 0;text-align:center;">loading...</div>';
  fetch('https://api.airtable.com/v0/'+BASE+'/'+TABLE+'?sort[0][field]=Score&sort[0][direction]=desc&pageSize=20',{
    headers:{'Authorization':'Bearer '+AIRTABLE_KEY}
  }).then(function(r){return r.json();}).then(function(d){
    if(!d.records||!d.records.length){
      list.innerHTML='<div style="font-size:.55rem;color:rgba(74,222,128,.3);text-align:center;padding:20px;">no kills yet</div>';
      return;
    }
    // dedupe by wallet, keep highest score
    var seen={}, top=[];
    for(var i=0;i<d.records.length;i++){
      var r=d.records[i].fields;
      if(!r.Wallet) continue;
      var w=r.Wallet.toLowerCase();
      if(!seen[w]||(r.Score||0)>seen[w].score){
        seen[w]={handle:r.Twitter||'anon',wallet:r.Wallet,score:r.Score||0};
      }
    }
    for(var k in seen) top.push(seen[k]);
    top.sort(function(a,b){return b.score-a.score;});
    top=top.slice(0,10);

    var medals=['[1]','[2]','[3]'];
    var out='';
    for(var i=0;i<top.length;i++){
      var p=top[i];
      var rank=medals[i]||(i+1);
      var isTop=i<3;
      out+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 8px;border-bottom:1px solid rgba(74,222,128,0.08);'+(isTop?'background:rgba(74,222,128,0.04);border-radius:4px;':'')+'">'+
        '<div style="display:flex;align-items:center;gap:10px;">'+
          '<span style="font-size:'+(isTop?'.9':'0.75')+'rem;min-width:24px;">'+rank+'</span>'+
          '<div>'+
            '<div style="font-size:.62rem;color:#e8dcc8;letter-spacing:1px;">'+escHtml(p.handle)+'</div>'+
            '<div style="font-size:.42rem;color:rgba(232,220,200,.3);letter-spacing:1px;">'+p.wallet.slice(0,6)+'...'+p.wallet.slice(-4)+'</div>'+
          '</div>'+
        '</div>'+
        '<div style="font-size:'+(isTop?'.75':'0.62')+'rem;color:#4ade80;font-weight:bold;letter-spacing:1px;">'+p.score+' kills</div>'+
      '</div>';
    }
    list.innerHTML=out;
  }).catch(function(){
    list.innerHTML='<div style="font-size:.55rem;color:#cc2200;text-align:center;padding:20px;">failed to load</div>';
  });
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function saveAdminScore(){
  var v=parseInt(document.getElementById('adminScore').value)||500;
  WIN_SCORE=v;
  // upsert to config table
  try{
    var r=await fetch('https://api.airtable.com/v0/'+BASE+'/'+CONFIG_TABLE+'?filterByFormula={Name}="WinScore"',{headers:{'Authorization':'Bearer '+AIRTABLE_KEY}});
    var d=await r.json();
    var method='POST', url='https://api.airtable.com/v0/'+BASE+'/'+CONFIG_TABLE;
    var body={fields:{Name:'WinScore',Value:String(v)}};
    if(d.records&&d.records.length){ method='PATCH'; url+='/'+d.records[0].id; }
    await fetch(url,{method:method,headers:{'Authorization':'Bearer '+AIRTABLE_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
    document.getElementById('adminScreen').style.display='none';
    alert('saved! win score = '+v);
  } catch(e){ alert('failed to save'); }
}

drawBG();
